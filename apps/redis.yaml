apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rajattyagi12/vizor.git
    targetRevision: HEAD
    path: config

  destination:
    server: https://kubernetes.default.svc
    namespace: vizor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
