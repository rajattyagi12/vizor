deployment:
  extraVolumes:
    - name: identity-schema
      configMap:
        name: kratos-identity-schema
  extraVolumeMounts:
    - name: identity-schema
      mountPath: /etc/config/kratos
      readOnly: true
  extraEnv:
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: vizor-secrets
          key: postgresUser
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: vizor-secrets
          key: postgresPassword
    - name: DSN
      value: "postgres://postgres:P@55w0rd@postgres-postgresql.vizor.svc.cluster.local:5432/orydb?sslmode=disable"

kratos:
  development: false
  autoMigrate: false

  config:
    dsn: env://DSN
    courier:
      smtp: {}
    identity:
      schemas:
        - id: default
          url: file:///etc/config/kratos/identity.schema.json
    selfservice:
      default_browser_return_url: http://vizor-frontend.vizor.svc.cluster.local:8000/
      flows:
        login:
          ui_url: http://vizor-frontend.vizor.svc.cluster.local:8000/login
        registration:
          ui_url: http://vizor-frontend.vizor.svc.cluster.local:8000/register
        settings:
          ui_url: http://vizor-frontend.vizor.svc.cluster.local:8000/settings
        recovery:
          ui_url: http://vizor-frontend.vizor.svc.cluster.local:8000/recovery
        verification:
          ui_url: http://vizor-frontend.vizor.svc.cluster.local:8000/verification
    serve:
      admin:
        base_url: http://kratos-admin.vizor.svc.cluster.local
        host: 127.0.0.1
        port: 4434
      public:
        base_url: http://kratos-public.vizor.svc.cluster.local
        host: 127.0.0.1
        port: 4433

migrate:
  enabled: true
  job:
    backoffLimit: 3
    activeDeadlineSeconds: 300
    env:
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: vizor-secrets
            key: postgresUser
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: vizor-secrets
            key: postgresPassword
      - name: DSN
        value: "postgres://postgres:P@55w0rd@postgres-postgresql.vizor.svc.cluster.local:5432/orydb?sslmode=disable"

identity:
  defaultSchemaURL: file:///etc/config/kratos/identity.schema.json

secret:
  secretsDefault: "replace-with-random-secret"
  secretsCookie: "replace-with-random-cookie-secret"
  secretsCipher: "replace-with-random-cipher-secret"

ingress:
  public:
    enabled: true
    className: nginx
    hosts:
      - host: kratos.vizor.local
        paths:
          - path: /
            pathType: Prefix
  admin:
    enabled: true
    className: nginx
    hosts:
      - host: kratos-admin.vizor.local
        paths:
          - path: /
            pathType: Prefix
