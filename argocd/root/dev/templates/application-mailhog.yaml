{{- $mailhog := index .Values "mailhog" }}
{{- if or (not $mailhog) (ne (index $mailhog "enabled") false) }}
# Standalone Mailhog Application (wave -2). No dependencies; SMTP capture + Web UI for dev/test.
# Service name "mailhog" — vizor-traffic renders mailhog-ingress when mailhog.enabled is true.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-{{ .Values.env.name }}-2-mailhog
  namespace: {{ .Values.argocdNamespace | quote }}
  labels:
    vizor.com/app-order: "0.5"
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.env.repoURL | quote }}
    targetRevision: {{ .Values.env.targetRevision | quote }}
    path: helm/vizor-mailhog
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: enabled
          value: {{ .Values.mailhog.enabled | default true | toString | quote }}
        - name: ingress.className
          value: {{ .Values.env.ingress.className | quote }}
        - name: gateway.name
          value: {{ .Values.gateway.name | default "" | quote }}
        - name: gateway.namespace
          value: {{ .Values.gateway.namespace | default "" | quote }}
        - name: gateway.listeners.http
          value: {{ index .Values.gateway.listeners "http" | default "web" | quote }}
        - name: gateway.listeners.https
          value: {{ index .Values.gateway.listeners "https" | default "websecure" | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.env.destinationNamespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
