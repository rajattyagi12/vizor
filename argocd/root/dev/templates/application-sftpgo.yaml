{{- if .Values.sftpgo.enabled | default false }}
# Standalone SFTPGo Application (wave 1). Depends on Kubespray-managed vizor-secrets (sftpPassword) and vizor-foundation (SA, Dapr).
# Service vizor-sftpgo; Dapr component sftpgo-binding is created by vizor-foundation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-{{ .Values.env.name }}-3-sftpgo
  namespace: {{ .Values.argocdNamespace | quote }}
  labels:
    vizor.com/app-order: "5.5"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.env.repoURL | quote }}
    targetRevision: {{ .Values.env.targetRevision | quote }}
    path: helm/vizor-sftpgo
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.env.destinationNamespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
