# Standalone Redis Application (wave -3, before vizor-foundation). CloudPirates OSS chart; service name vizor-redis-master for Dapr/SignalR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-{{ .Values.env.name }}-0-redis
  namespace: {{ .Values.argocdNamespace | quote }}
  labels:
    vizor.com/app-order: "0"
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: "23.2.12"
    helm:
      parameters:
        - name: fullnameOverride
          value: {{ .Values.env.redisServiceName | default "vizor-redis-master" | quote }}
        - name: auth.enabled
          value: "false"
        - name: architecture
          value: standalone
        - name: persistence.enabled
          value: "false"
        - name: metrics.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.env.destinationNamespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
