argocdNamespace: argocd
project: default

sftpgo:
  enabled: true

applicationSet:
  name: vizor-apps-dev

# Gateway API: when set (e.g. by kubespray argocd_vizor valuesObject), child charts render HTTPRoute instead of Ingress.
# Leave empty when not using Gateway API; children fall back to Ingress.
gateway:
  name: ""
  namespace: ""
  listeners:
    http: "web"
    https: "websecure"
    grpc: ""

env:
  name: dev
  repoURL: git@git.nbt.local:vizor/deploy.git
  targetRevision: develop
  destinationNamespace: vizor
  baseValuesFile: values.yaml
  image:
    projectRegistry: harbor.nbt.local
  # redisServiceName: optional; default vizor-redis-master. Dapr redisHost is derived as <redisServiceName>:6379 from the Redis app (same namespace).
  clusterDomain: ""  # injected by kubespray argocd_vizor role from dns_domain (e.g. k8s.nbt)
  otel:
    enabled: "false"  # injected by kubespray; true when argocd_vizor_otel_enabled resolves to true
  ingress:
    className: traefik
    host: ""
    publicHost: ""
    publicScheme: ""
