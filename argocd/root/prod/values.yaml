argocdNamespace: argocd
project: default

# Set false to omit the standalone mailhog Application (no SMTP capture in prod).
mailhog:
  enabled: false

sftpgo:
  enabled: false

applicationSet:
  name: vizor-apps-prod

# Gateway API: set by kubespray argocd_vizor or leave empty for Ingress fallback.
gateway:
  name: ""
  namespace: ""
  listeners:
    http: "web"
    https: "websecure"
    grpc: ""

env:
  name: prod
  repoURL: "#CHANGEME"
  targetRevision: main
  destinationNamespace: vizor
  baseValuesFile: values.yaml
  image:
    projectRegistry: "#CHANGEME"
  # redisServiceName: optional; default vizor-redis-master. Dapr redisHost derived from Redis app.
  clusterDomain: ""  # injected by kubespray argocd_vizor role from dns_domain (e.g. k8s.nbt)
  otel:
    enabled: "false"  # injected by kubespray; true when argocd_vizor_otel_enabled resolves to true
  ingress:
    className: traefik
    host: "#CHANGEME"
    publicHost: ""
    publicScheme: ""
