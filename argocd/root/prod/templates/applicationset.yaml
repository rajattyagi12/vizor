{{- if or (not .Values.env.repoURL) (eq .Values.env.repoURL "#CHANGEME") -}}
{{- fail "env.repoURL must be set on the root Application via Helm parameter env.repoURL (use same URL as source.repoURL)." -}}
{{- end -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSet.name | quote }}
  namespace: {{ .Values.argocdNamespace | quote }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - env: {{ .Values.env.name | quote }}
                  repoURL: {{ .Values.env.repoURL | quote }}
                  targetRevision: {{ .Values.env.targetRevision | quote }}
                  destinationNamespace: {{ .Values.env.destinationNamespace | quote }}
                  derivedServiceAccountName: {{ printf "%s-runtime" .Values.env.destinationNamespace | quote }}
                  baseValuesFile: {{ .Values.env.baseValuesFile | quote }}
                  envValuesFile: {{ .Values.env.envValuesFile | quote }}
                  ingressClassName: {{ .Values.env.ingress.className | quote }}
                  ingressHost: {{ .Values.env.ingress.host | quote }}
                  ingressCertName: {{ .Values.env.ingress.certName | quote }}
                  ingressCertIssuer: {{ .Values.env.ingress.certIssuer | quote }}
          - list:
              elements:
                - order: 1
                  appName: vizor-secrets
                  wave: "-2"
                  chartPath: helm/vizor-secrets
                  appEnvValuesFile: ../vizor/values-env/prod/secrets.yaml
                  layerValuesFile: ../vizor/values-layers/values-secrets.yaml
                  extraValueFile: ../vizor/values-layers/values-empty.yaml
                - order: 2
                  appName: vizor-foundation
                  wave: "-2"
                  chartPath: helm/vizor-foundation
                  appEnvValuesFile: ../vizor/values-env/prod/foundation.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
                - order: 3
                  appName: vizor-data-init
                  wave: "-1"
                  chartPath: helm/vizor-data-init
                  appEnvValuesFile: ../vizor/values-env/prod/data-init.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
                - order: 4
                  appName: vizor-identity
                  wave: "0"
                  chartPath: helm/vizor-identity
                  appEnvValuesFile: ../vizor/values-env/prod/identity.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
                - order: 5
                  appName: vizor-platform-support
                  wave: "1"
                  chartPath: helm/vizor-platform-support
                  appEnvValuesFile: ../vizor/values-env/prod/platform-support.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
                - order: 6
                  appName: vizor-apps
                  wave: "2"
                  chartPath: helm/vizor-apps
                  appEnvValuesFile: ../vizor/values-env/prod/apps.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
                - order: 7
                  appName: vizor-traffic-autoscale
                  wave: "3"
                  chartPath: helm/vizor-traffic
                  appEnvValuesFile: ../vizor/values-env/prod/traffic-autoscale.yaml
                  layerValuesFile: values.yaml
                  extraValueFile: values.yaml
  template:
    metadata:
      name: {{ "{{ .appName }}" | quote }}
      namespace: {{ .Values.argocdNamespace | quote }}
      labels:
        vizor.com/app-order: {{ "{{ .order }}" | quote }}
      annotations:
        argocd.argoproj.io/sync-wave: {{ "{{ .wave }}" | quote }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: {{ .Values.project | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ "{{ .destinationNamespace }}" | quote }}
      source:
        repoURL: {{ "{{ .repoURL }}" | quote }}
        targetRevision: {{ "{{ .targetRevision }}" | quote }}
        path: {{ "{{ .chartPath }}" | quote }}
        helm:
          valueFiles:
            - {{ "{{ .baseValuesFile }}" | quote }}
            - {{ "{{ or .appEnvValuesFile .envValuesFile }}" | quote }}
            - {{ "{{ .layerValuesFile }}" | quote }}
            - {{ "{{ .extraValueFile }}" | quote }}
          parameters:
            - name: serviceAccount.name
              value: {{ "{{ .derivedServiceAccountName }}" | quote }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{ "{{- if eq .appName \"vizor-traffic-autoscale\" }}" }}
    spec:
      source:
        helm:
          parameters:
            - name: ingress.className
              value: '{{ "{{ .ingressClassName }}" }}'
            - name: ingress.host
              value: '{{ "{{ .ingressHost }}" }}'
            - name: ingress.certName
              value: '{{ "{{ .ingressCertName }}" }}'
            - name: ingress.certIssuer
              value: '{{ "{{ .ingressCertIssuer }}" }}'
            - name: serviceAccount.name
              value: '{{ "{{ .derivedServiceAccountName }}" }}'
    {{ "{{- end }}" }}
