{{- $mailhog := index .Values "mailhog" }}
{{- if or (not $mailhog) (ne (index $mailhog "enabled") false) }}
{{- if or (not .Values.env.repoURL) (eq .Values.env.repoURL "#CHANGEME") -}}
{{- fail "env.repoURL must be set on the root Application (Helm parameter env.repoURL, same as source.repoURL)." -}}
{{- end }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-{{ .Values.env.name }}-2-mailhog
  namespace: {{ .Values.argocdNamespace | quote }}
  labels:
    vizor.com/app-order: "0.5"
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  source:
    repoURL: {{ .Values.env.repoURL | quote }}
    targetRevision: {{ .Values.env.targetRevision | quote }}
    path: helm/vizor-mailhog
    helm:
      valueFiles:
        - values.yaml
        - ../vizor/values-env/prod/mailhog.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.env.destinationNamespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
