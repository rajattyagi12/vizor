# Standalone vizor-secrets Application (wave -2). Not in the ApplicationSet to avoid risk of
# the controller deleting the Application (and the Secret) when the generator list or template changes.
# Paste overrides under secretValues in root Helm values; they are merged into this app only.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-secrets
  namespace: {{ .Values.argocdNamespace | quote }}
  labels:
    vizor.com/app-order: "1"
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.env.destinationNamespace | quote }}
  source:
    repoURL: {{ .Values.env.repoURL | quote }}
    targetRevision: {{ .Values.env.targetRevision | quote }}
    path: helm/vizor-secrets
    helm:
      valueFiles:
        - {{ .Values.env.baseValuesFile | quote }}
        - ../vizor/values-env/{{ .Values.env.name }}/secrets.yaml
        - ../vizor/values-layers/values-secrets.yaml
        - ../vizor/values-layers/values-empty.yaml
      values: {{ .Values.secretValues | default "" | quote }}
      parameters:
        - name: serviceAccount.name
          value: {{ printf "%s-runtime" .Values.env.destinationNamespace | quote }}
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
