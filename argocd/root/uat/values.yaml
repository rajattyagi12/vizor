argocdNamespace: argocd
project: default

# Set false to omit the standalone mailhog Application (no SMTP capture in UAT/prod).
mailhog:
  enabled: false

sftpgo:
  enabled: false

applicationSet:
  name: vizor-apps-uat

# Gateway API: set by kubespray argocd_vizor or leave empty for Ingress fallback.
gateway:
  name: ""
  namespace: ""
  listeners:
    http: "web"
    https: "websecure"
    grpc: ""

env:
  name: uat
  repoURL: "#CHANGEME"
  targetRevision: uat
  destinationNamespace: vizor
  baseValuesFile: values.yaml
  image:
    projectRegistry: "#CHANGEME"
  # redisServiceName: optional; default vizor-redis-master. Dapr redisHost derived from Redis app.
  ingress:
    className: traefik
    host: "#CHANGEME"
    publicHost: ""
    publicScheme: ""
