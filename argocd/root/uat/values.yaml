argocdNamespace: argocd
project: default

applicationSet:
  name: vizor-apps-uat

env:
  name: uat
  repoURL: "#CHANGEME"
  targetRevision: uat
  destinationNamespace: vizor
  baseValuesFile: values.yaml
  envValuesFile: values-uat.yaml
  # redisServiceName: optional; default vizor-redis-master. Dapr redisHost derived from Redis app.
  ingress:
    className: traefik
    host: "#CHANGEME"
    certName: "#CHANGEME"
    certIssuer: "#CHANGEME"
