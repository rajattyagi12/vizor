# DEPRECATED: transition fallback only.
# Use environment-specific ApplicationSet roots instead:
# - argocd/root/dev/applicationset.yaml
# - argocd/root/uat/applicationset.yaml
# - argocd/root/prod/applicationset.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-foundation
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: vizor
  source:
    repoURL: git@CHANGE-ME:vizor/deploy.git
    targetRevision: CHANGE-ME
    path: helm/vizor
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
        - values-layers/values-foundation.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
