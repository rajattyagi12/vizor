# Root app values override bundle for UAT

argocdNamespace: argocd
project: vizor-uat

applicationSet:
  name: vizor-apps-uat

mailhog:
  enabled: false

env:
  name: uat
  repoURL: git@gitlab.com:nbt-projects/vizor/deploy.git
  targetRevision: uat
  destinationNamespace: vizor-uat
  baseValuesFile: values.yaml
  image:
    # Project images only (vizor-*). Standard/vendor images remain chart defaults.
    projectRegistry: registry.vizor-registry.svc.k8s.vizor:5000
  ingress:
    className: traefik
    host: vizor-uat.k8s.vizor.local

# Merged only into vizor-secrets child app via template value injection.
# Runtime credentials are managed by Kubespray via the vizor-secrets Secret.
secretValues: |
  image:
    registry: "#CHANGEME"

  sqlServer:
    enabled: false
    database: "#CHANGEME"
    username: "#CHANGEME"
    dbPassword: "#CHANGEME"
    service:
      name: "#CHANGEME"

  sftpgo:
    enabled: false
    persistence:
      enabled: false

  daprComponents:
    sftp:
      address: "#CHANGEME"
      username: "#CHANGEME"
      password: "#CHANGEME"
      rootPath: /upload
    # redisHost defaults from root Redis app. Override only if needed.
    state:
      redisHost: vizor-redis-master:6379
    pubsub:
      redisHost: vizor-redis-master:6379
    secrets:
      smtp-host: "#CHANGEME"
      smtp-port: "587"
      smtp-starttls: "true"
      smtp-auth: "true"
      smtp-mail-display-name: "Vizor"
      smtpusername: "#CHANGEME"
      smtppassword: "#CHANGEME"
      SsrsBaseUrl: "#CHANGEME"
      SsrsUsername: "#CHANGEME"
      SsrsPassword: "#CHANGEME"

  local-path-provisioner:
    enabled: false

  keycloakRealmConfiguration:
    serverUrl: "#CHANGEME"
    clientPrivateSecret: "#CHANGEME"
    adminUser:
      password: "#CHANGEME"
    keycloakEnv:
      KC_DB_USERNAME: "#CHANGEME"
      KC_DB_PASSWORD: "#CHANGEME"
      KEYCLOAK_ADMIN: "#CHANGEME"
      KEYCLOAK_ADMIN_PASSWORD: "#CHANGEME"
      AUTH_DATABASE_NAME: "#CHANGEME"
    resources:
      requested_memory: 512Mi
      requested_cpu: 500m
    realmJson:
      clients:
        - {}
        - secret: "#CHANGEME"
