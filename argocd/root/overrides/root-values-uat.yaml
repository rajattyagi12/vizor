# Root app values override bundle for UAT

argocdNamespace: argocd
project: vizor-uat

applicationSet:
  name: vizor-apps-uat

mailhog:
  enabled: false

sftpgo:
  enabled: false

env:
  name: uat
  repoURL: git@gitlab.com:nbt-projects/vizor/deploy.git
  targetRevision: uat
  destinationNamespace: vizor-uat
  baseValuesFile: values.yaml
  image:
    # Project images only (vizor-*). Standard/vendor images remain chart defaults.
    projectRegistry: registry.vizor-registry.svc.k8s.vizor:5000
  ingress:
    className: traefik
    host: vizor-uat.k8s.vizor.local
    publicHost: ""
