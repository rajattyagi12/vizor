# Independent values for vizor-apps chart.

global:
  namespace: vizor
  secretName: vizor-secrets
  serviceAccountName: vizor-runtime
  migrationsJobName: vizor-migrations  # Must match vizor-data-init's job name

  # Fixed deployment/service names (naming contract) for Caddy and Ingress
  serviceNames:
    core: vizor-core-service
    engagement: vizor-engagement-service
    interaction: vizor-interaction-service
    frontend: vizor-frontend

# Do not create SA here; use the one created by vizor-foundation (vizor-runtime).
serviceAccount:
  create: false
  name: ""
  annotations: {}

image:
  registry: harbor.nbt.local
  repo: vizor
  tag: latest
  pullSecrets: []

resources:
  limits:
    cpu: 256m
    memory: 512Mi
  requests:
    cpu: 64m
    memory: 128Mi

coreService:
  replicas: 2
  annotations: {}

engagementService:
  replicas: 2
  annotations: {}

interactionService:
  replicas: 2
  annotations: {}
  # When using root app-of-apps, match the Redis app (env.redisServiceName:6379, default vizor-redis-master)
  redisConnectionString: "vizor-redis-master:6379"

frontend:
  replicas: 1
  annotations: {}

scheduling:
  affinity: {}
  topologySpreadConstraints: []

useMigrationSql: false

auth:
  clientId: ""  # Set to enable auth (e.g. vizor-client)
