{{- if .Values.gateway.name }}
---
# Gateway API HTTPRoute — main Vizor app via Caddy api-proxy. Replaces Ingress when gateway is set.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vizor-app
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.http | default "web" }}
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.https | default "websecure" }}
  {{- if .Values.ingress.host }}
  hostnames:
    - "{{ .Values.ingress.host }}"
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-proxy
          port: 80
{{- end }}
