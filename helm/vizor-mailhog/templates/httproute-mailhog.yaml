{{- if .Values.gateway.name }}
---
# Gateway API HTTPRoute — Mailhog Web UI. Replaces Ingress when gateway is set.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mailhog
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.http | default "web" }}
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.https | default "websecure" }}
  hostnames:
    - {{ .Values.ingress.host | default (printf "mailhog-%s.k8s.nbt.local" .Release.Namespace) | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mailhog
          port: {{ .Values.service.webPort }}
{{- end }}
