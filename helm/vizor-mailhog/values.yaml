# Standalone Mailhog — no dependencies. Deploy early (e.g. wave -2) like Redis.
# Ingress is in this chart (Mailhog is not HA).

enabled: true  # Set false to render no resources (e.g. in envs that don't need Mailhog).

image:
  repository: docker.io/mailhog/mailhog
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  smtpPort: 1025
  webPort: 8025

replicas: 1  # Single replica; no HA needed for dev/test SMTP capture

ingress:
  host: ""      # Fully-qualified hostname; when empty, falls back to mailhog-<namespace>.<domain>
  domain: ""    # Cluster ingress domain (e.g. k8s.nbt.local); injected by kubespray via argocd_vizor_ingress_domain

# Gateway API: when set, chart renders HTTPRoute instead of Ingress.
gateway:
  name: ""
  namespace: ""
  listeners:
    http: "web"
    https: "websecure"
