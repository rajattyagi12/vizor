# Standalone Mailpit — no dependencies. Deploy early (e.g. wave -2) like Redis.
# Ingress is in this chart (Mailpit is not HA).

enabled: true  # Set false to render no resources (e.g. in envs that don't need Mailhog).

image:
  repository: axllent/mailpit
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  smtpPort: 1025
  webPort: 8025

replicas: 1  # Single replica; no HA needed for dev/test SMTP capture

ingress:
  host: ""      # Fully-qualified hostname; when empty, falls back to mailhog-<namespace>.<domain>
  domain: ""    # Cluster ingress domain (e.g. k8s.nbt.local); injected by kubespray via argocd_vizor_ingress_domain

auth:
  secretName: vizor-secrets
  usernameKey: smtpusername
  passwordKey: smtppassword
  mountPath: /etc/mailpit-auth
  fileName: ui-passwords.txt
  uiAuthFile: /etc/mailpit-auth/ui-passwords.txt

runtime:
  enableChaos: true
  allowInternalHttpRequests: true
  enableSpamAssassin: true
  smtpAuthAcceptAny: true

# Gateway API: when set, chart renders HTTPRoute instead of Ingress.
gateway:
  name: ""
  namespace: ""
  listeners:
    http: "web"
    https: "websecure"
