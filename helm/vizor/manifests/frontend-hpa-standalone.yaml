# Standalone HPA manifest for frontend
# Apply manually with: kubectl apply -f frontend-hpa-standalone.yaml -n <namespace>
# This HPA is protected from Helm/ArgoCD overwrites via helm.sh/resource-policy: keep annotation
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vizor-frontend
  namespace: <NAMESPACE>  # Replace with your namespace (e.g., vizor-prod)
  annotations:
    # Protection: Resource policy prevents Helm/ArgoCD from updating/deleting
    helm.sh/resource-policy: keep
    # Additional sync option (defense in depth)
    argocd.argoproj.io/sync-options: Replace=false
  labels:
    app.kubernetes.io/name: vizor
    app.kubernetes.io/instance: vizor
    vizor: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vizor-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
