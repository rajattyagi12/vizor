        publicClient: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "{{ .Values.keycloakRealmConfiguration.serverUrl }}/*"
        attributes:
          post.logout.redirect.uris: "{{ .Values.keycloakRealmConfiguration.serverUrl }}/*"
        enabled: true

observability:
  enabled: false
