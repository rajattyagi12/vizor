# -- Persistent Volume and Claim configuration for SFTPGo and backups
persistence:
  # Removed: sftpPvName, sftpStoragePath, sftpgoDbPvName, sftpgoDbStoragePath, backupPvName, backupStoragePath
  sftpPvcName: sftp-pvc        # This PVC will be for /srv (SFTP user homes)
  sftpgoDbPvcName: sftpgo-db-pvc # This PVC will be for /data (SFTPGo database)
  backupPvcName: backup-pvc    # This PVC will be for backups
  storageClass: local-path     # Use the StorageClass provided by the subchart

# -- SFTPGo Server Configuration
sftpGo:
  enabled: true
  createDefaultUser: true
  image: ghcr.io/drakkan/sftpgo:v2.6.6 # Using the official SFTPGo image
  port: 2022 # SFTP port
  httpPort: 8080 # HTTP/API port for SFTPGo
  daprUsername: dapruser # Username for Dapr binding to use
  daprUserHomeDir: "/srv/dapruser" # SFTPGo internal path for the daprUser's home directory
  # === IMPORTANT: Replace with the RAW content of your ~/.ssh/dapr_sftp_key.pub ===
  daprUserPublicKey: |
    ssh-rsa  veersingh@NBT-Veer-Mini.local
  # === END IMPORTANT ===
  enablePasswordAuth: false # Disable password authentication for SFTPGo
  enableKeyAuth: true # Enable SSH key authentication for SFTPGo
  fsGroup: 1001 # Recommended UID/GID for SFTPGo data directory permissions
  adminAuthToken: "8862417938fe9ec10410b190c726877eace287f40999572ac15709b5acdc8538"
  userJson: >
    {
      "username": "dapruser",
      "home_dir": "/srv/dapruser",
      "public_keys": [
        "ssh-rsa  veersingh@NBT-Veer-Mini.local"
      ],
      "permissions": {
        "/": ["*"]
      },
      "uid": "1001",
      "gid": "1001",
      "status": 1,
      "description": "User managed by Kubernetes job"
    }
  dataProvider:
    config:
      users_base_dir: /srv

# -- SFTPGo Backup CronJob Configuration
backupCronJob:
  enabled: false
  schedule: "0 2 * * *" # Daily at 2 AM UTC
  image: busybox:latest # For `cp -a`, consider custom image for `rsync`
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

# --- Configuration for the local-path-provisioner subchart ---
local-path-provisioner: # This key must match the `name` in Chart.yaml dependencies
  enabled: true         # Ensure the subchart is enabled
  storageClass:
    create: true        # Ensure it creates the StorageClass
    defaultClass: true  # Make it the default StorageClass (optional, but convenient)
    name: local-path    # Ensure the StorageClass name is 'local-path'
    reclaimPolicy: Retain # <--- IMPORTANT: Set reclaim policy to Retain
    volumeBindingMode: WaitForFirstConsumer
  # You can customize other local-path-provisioner values here if needed
  # For example, to change the base path on the node (advanced):
  # nodePathMap:
  # - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
  #   paths: [/opt/my-sftpgo-data]