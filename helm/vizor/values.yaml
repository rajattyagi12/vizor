      contentSecurityPolicy: "frame-src 'self' http://127.0.0.1:8080 http://127.0.0.1; frame-ancestors 'self'; object-src 'none';"
      xContentTypeOptions: "nosniff"
      xRobotsTag: "none"
      xFrameOptions: "SAMEORIGIN"
      contentSecurityPolicyReportOnly: ""
      xXSSProtection: "1; mode=block"
      strictTransportSecurity: "max-age=31536000; includeSubDomains"

    roles:
      realm:
        - name: Superuser
          description: Superuser role
        - name: Director
          description: Director role
        - name: Associate
          description: Associate role
        - name: Events Admin
          description: Events Admin role
        - name: Viewer
          description: Viewer role
        - name: Client
          description: Client role
        - name: Configuration Manager
          description: Configuration Manager role

    clients:
      - clientId: vizor-client
        name: Vizor Client
