#
# Default values for vizor Helm chart
#

# -- Global settings for the Helm chart
global:
  namespace: vizor # Your target namespace. All resources will be deployed here.

image:
  # -- Image registry, only change if you're using your own images
  registry: harbor.nbt.local
  # -- Image repository
  repo: vizor
  # -- Image tag
  tag: latest
  # -- Any pullsecrets that are required to pull the image
  pullSecrets: []

auth:
  # -- Set this to enable authentication, leave unset to run in demo mode
  clientId:

ingress:
  # -- Ingress host DNS name
  host:
  # -- Set this to enable TLS, leave unset to run in insecure mode
  certName:
  # -- Cert manager issuer, leave unset to run in insecure mode
  certIssuer:

resources:
  limits:
    # -- CPU limit for the containers, leave alone mostly
    cpu: 128m
    # -- Memory limit for the containers, leave alone mostly
    memory: 256Mi

coreService:
  # -- Dapr store core annotations
  annotations:
  # -- Dapr store core replica count
  replicas: 1

engagementService:
  # -- Dapr store engagement annotations
  annotations:
  # -- Dapr store engagement replica count
  replicas: 1

interactionService:
  # -- Dapr store interaction annotations
  annotations:
  # -- Dapr store interaction replica count
  replicas: 0

# users:
#   # -- Dapr store users annotations
#   annotations:
#   # -- Dapr store users replica count
#   replicas: 1

frontend:
  # -- Dapr store frontend host annotations
  annotations:
  # -- Dapr store frontend host replica count
  replicas: 1

daprComponents:
  # -- Enable to deploy the Dapr components
  deploy: true
  state:
    # -- Dapr state store component name
    name: statestore
    # -- Hostname of redis, fullnameOverride should be used when deploying redis helm chart
    redisHost: vizor-redis-master:6379
  pubsub:
    # -- Dapr pubsub component name
    name: pubsub
    # -- Hostname of redis, fullnameOverride should be used when deploying redis helm chart
    redisHost: vizor-redis-master:6379

  secrets:

  secretStore:
    name: vizor-secretstore
    componentType: secretstores.kubernetes
    secretName: vizor-secrets

sqlServer:
  enabled: true
  image: "mcr.microsoft.com/mssql/server"
  version: "2022-latest"
  releaseName: sqlserver
  username: "sa"
  database: "vizor"
  dbPassword: "P@55w0rd"
  service:
    name: sql-server-service
    port: 1433

postgresql:
  enabled: false
  image: "postgres"
  version: "16"
  releaseName: postgres
  username: "vizor"
  database: "vizor-identity"
  dbPassword: "P@55w0rd"
  databases:
    - "vizor-oauth2"
  service:
    name: postgres-postgresql
    port: 5432
  primary:
    persistence:
      enabled: true
      storageClass: "local-path" # Use your specified storage class
      size: 5Gi # You can adjust this size as needed
    volumePermissions: # Often needed for local-path to ensure correct permissions
      enabled: true

# -- Persistent Volume and Claim configuration for SFTPGo and backups
persistence:
  enabled: false # Enable persistence for SFTPGo and backups
  size: 5Gi # Size of the persistent volume
  storageClass: local-path # Use the StorageClass provided by the subchart

# -- Backup CronJob Configuration
backupCronJob:
  enabled: false
  schedule: "0 2 * * *" # Daily at 2 AM UTC
  image: busybox:latest # For `cp -a`, consider custom image for `rsync`
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

# --- Configuration for the local-path-provisioner subchart ---
local-path-provisioner: # This key must match the `name` in Chart.yaml dependencies
  enabled: true # Ensure the subchart is enabled
  storageClass:
    create: true # Ensure it creates the StorageClass
    defaultClass: true # Make it the default StorageClass (optional, but convenient)
    name: local-path # Ensure the StorageClass name is 'local-path'
    reclaimPolicy: Retain # <--- IMPORTANT: Set reclaim policy to Retain
    volumeBindingMode: WaitForFirstConsumer
  # You can customize other local-path-provisioner values here if needed
  # For example, to change the base path on the node (advanced):
  # nodePathMap:
  # - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
  #   paths: [/opt/my-sftpgo-data]

# -- SFTPGo Configuration
sftpgo:
  enabled: true
  image:
    repository: drakkan/sftpgo
    tag: latest
    pullPolicy: IfNotPresent
  config:
    common:
      proxy_protocol: 1
    data_provider:
      create_default_admin: false
      description_file: /etc/sftpgo/description.json
    users:
      - username: vizor
        password: password
        status: 1
        permissions:
          - read
          - write
        home_dir: /srv/sftpgo/data/vizor
    admins:
      - username: admin
        password: admin
        status: 1
        permissions:
          - "*"
    folders: []
    version: 7
  description:
    admins:
      - id: 1
        username: admin
        password: admin
        status: 1
        permissions:
          - "*"
    users:
      - id: 2
        username: vizor
        password: password
        status: 1
        home_dir: /srv/sftpgo/data/vizor
        permissions:
          - read
          - write
    folders: []
    version: 7
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path
  service:
    port: 2022
  ui:
    enabled: true
