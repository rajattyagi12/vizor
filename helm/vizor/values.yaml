    username: "dapruser" # SFTPGo user created for Dapr
    # hostPublicKey: "" # Optional: For production, get SFTPGo's host public key fingerprint for host validation
    insecureIgnoreHostKey: "true" # ONLY for dev/testing, NOT recommended for production


sqlServer:
  enabled: true
  image: "mcr.microsoft.com/mssql/server"
  version: "2022-latest"
  releaseName: sqlserver
  username: "sa"
  database: "vizor"
  dbPassword: "P@55w0rd"
  service:
    name: sql-server-service
    port: 1433

