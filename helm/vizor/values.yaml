#
# Default values for vizor Helm chart
#

# -- Global settings for the Helm chart
global:
  namespace: vizor # Your target namespace. All resources will be deployed here.

image:
  # -- Image registry, only change if you're using your own images
  # For kind clusters, use 'localhost' or leave empty
  registry: harbor.nbt.local
  # -- Image repository
  repo: vizor
  # -- Image tag
  tag: latest
  # -- Image pull policy. Use 'IfNotPresent' for local development with kind
  pullPolicy: Always
  # -- Any pullsecrets that are required to pull the image
  pullSecrets: []

auth:
  # -- Set this to enable authentication, leave unset to run in demo mode
  clientId:

ingress:
  enabled: false
  # -- Ingress class for ingress-rules
  className: nginx
  # -- Ingress host DNS name
  # Set this to your domain name (e.g., "vizor.k8s.nbt.local") or leave empty to use load balancer IP
  host: vizor.k8s.nbt.local  # -- Set this to enable TLS, leave unset to run in insecure mode

  certName: # -- Cert manager issuer, leave unset to run in insecure mode

  certIssuer:

# API Proxy Service Configuration (used when ingress is disabled)
apiProxy:
  # -- Service type for api-proxy service (when ingress.enabled=false)
  # Options: NodePort, LoadBalancer, ClusterIP
  # Default: LoadBalancer (recommended for production/ArgoCD)
  serviceType: LoadBalancer
  # -- NodePort for api-proxy service (only used when serviceType=NodePort)
  # Default: 30080
  nodePort: 30080
  # -- LoadBalancer IP (optional, only used when serviceType=LoadBalancer)
  # Set this if you have a static IP reserved for the load balancer
  loadBalancerIP:

resources:
  limits:
    # -- CPU limit for the containers, leave alone mostly
    cpu: 256m
    # -- Memory limit for the containers, leave alone mostly
    memory: 512Mi
  requests:
    # -- CPU limit for the containers, leave alone mostly
    cpu: 64m
    # -- Memory limit for the containers, leave alone mostly
    memory: 128Mi

coreService:
  # -- Dapr store core annotations
  annotations: # -- Dapr store core replica count

  replicas: 2

engagementService:
  # -- Dapr store engagement annotations
  annotations: # -- Dapr store engagement replica count

  replicas: 2

interactionService:
  # -- Dapr store interaction annotations
  annotations: # -- Dapr store interaction replica count
  # Multiple replicas supported with ClientIP session affinity configured in service
  # Session affinity ensures all SignalR requests from same client hit the same pod
  replicas: 2
  # -- Redis connection string for SignalR backplane
  # This is used by SignalR to share connection state across multiple pods
  # Format: "host:port" (e.g., "vizor-redis-master:6379")
  # If not set, defaults to "vizor-redis-master:6379" in Program.cs
  redisConnectionString: "vizor-redis-master:6379"

useMigrationSql: false

# users:
#   # -- Dapr store users annotations
#   annotations:
#   # -- Dapr store users replica count
#   replicas: 1

frontend:
  # -- Dapr store frontend host annotations
  annotations: # -- Dapr store frontend host replica count

  replicas: 1

daprComponents:
  # -- Enable to deploy the Dapr components
  deploy: true
  state:
    # -- Dapr state store component name
    name: statestore
    # -- Hostname of redis (for local kind cluster: vizor-redis-master, for k8s: dapr-redis-master.dapr-system.svc.k8s.nbt)
    redisHost: vizor-redis-master:6379
  pubsub:
    # -- Dapr pubsub component name
    name: pubsub
    # -- Hostname of redis (for local kind cluster: vizor-redis-master, for k8s: dapr-redis-master.dapr-system.svc.k8s.nbt)
    redisHost: vizor-redis-master:6379

  secrets:
    smtp-host: "email-smtp.us-east-1.amazonaws.com"
    smtp-port: "587"
    smtp-starttls: "true"
    smtp-auth: "true"
    smtp-mail-display-name: "Vizor"
    smtpusername: "AKIAVWE2WCVHKTCNHJEE"
    smtppassword: "BIqlgWKuB3MhaFYTxaAXCeglcjLL7mzHYGR1G54OqHLM"
  secretStore:
    name: vizor-secretstore
    componentType: secretstores.kubernetes
    secretName: vizor-secrets

  sftp:
    name: sftpgo-binding
    componentType: bindings.sftp
    rootPath: "." # The home directory for the 'vizor' user
    address: "vizor-sftpgo:2022" # Your SFTPGo service address
    username: "vizor" # SFTPGo user
    password: "Vizor@123" # The key in the secret that contains the password
    insecureIgnoreHostKey: true # Caution: Use only for testing. Set to "false" in production.

sqlServer:
  enabled: true
  image: "mcr.microsoft.com/mssql/server"
  version: "2022-latest"
  releaseName: sqlserver
  username: "sa"
  database: "vizor"
  dbPassword: "P@55w0rd"
  service:
    name: sql-server-service
    port: 1433

postgresql:
  enabled: false
  image: "postgres"
  version: "16"
  releaseName: postgres
  username: "vizor"
  database: "vizor-identity"
  dbPassword: "P@55w0rd"
  databases:
    - "vizor-oauth2"
  service:
    name: postgres-postgresql
    port: 5432
  primary:
    persistence:
      enabled: true
      storageClass: "local-path" # Use your specified storage class
      size: 5Gi # You can adjust this size as needed
    volumePermissions:
      # Often needed for local-path to ensure correct permissions
      enabled: true

# -- Persistent Volume and Claim configuration for SFTPGo and backups
persistence:
  enabled: false # Enable persistence for SFTPGo and backups
  size: 5Gi # Size of the persistent volume
  storageClass: local-path # Use the StorageClass provided by the subchart

# -- Backup CronJob Configuration
backupCronJob:
  enabled: false
  schedule: "0 2 * * *" # Daily at 2 AM UTC
  image: busybox:latest # For `cp -a`, consider custom image for `rsync`
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

# --- Configuration for the local-path-provisioner subchart ---
local-path-provisioner:
  # This key must match the `name` in Chart.yaml dependencies
  enabled: true # Ensure the subchart is enabled
  storageClass:
    create: true # Ensure it creates the StorageClass
    defaultClass: true # Make it the default StorageClass (optional, but convenient)
    name: local-path # Ensure the StorageClass name is 'local-path'
    reclaimPolicy: Retain # <--- IMPORTANT: Set reclaim policy to Retain
    volumeBindingMode: WaitForFirstConsumer
  # You can customize other local-path-provisioner values here if needed
  # For example, to change the base path on the node (advanced):
  nodePathMap:
    - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
      paths:
        - /opt/local-path-provisioner

# -- SFTPGo Configuration
sftpgo:
  enabled: true
  image:
    repository: drakkan/sftpgo
    tag: v2.6.6
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  service:
    type: ClusterIP
    ports:
      - name: sftp
        port: 2022
        targetPort: 2022
        protocol: TCP
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP

  env:
    - name: SFTPGO_DATA_PROVIDER__DRIVER
      value: "sqlite"
    - name: SFTPGO_DATA_PROVIDER__NAME
      value: "/srv/sftpgo/sftpgo.db"
    - name: SFTPGO_PRE_CREATE_USERS_FILE
      value: /etc/sftpgo/description.json
    - name: SFTPGO_LOADDATA_FROM
      value: /etc/sftpgo/description.json
    - name: SFTPGO_CONFIG_FILE # 👈 NEW
      value: /etc/sftpgo/config.yml
    - name: SFTPGO_DEFAULT_ADMIN_ENABLED
      value: "false" # because we load from json instead
  # Write config.yml into a ConfigMap
  config: |
    data_provider:
      driver: sqlite
      name: "/srv/sftpgo/sftpgo.db"

    httpd:
      bindings:
        - port: 8080
          enable_web_admin: true
          enable_web_client: true
          enable_rest_api: true
          enable_https: false

    sftpd:
      bindings:
        - port: 2022

    common:
      max_total_connections: 1000
      max_per_host_connections: 50
      max_login_attempts: 5
      log_level: info
      log_file: "/srv/sftpgo/log/sftpgo.log"

    telemetry:
      enabled: false

    create_default_admin: false

  extraConfigmapMounts:
    - name: vizor-sftpgo-description # 👈 use the existing ConfigMap name
      mountPath: /etc/sftpgo/description.json
      subPath: description.json
      readOnly: true
  # Write description.json into a ConfigMap
  description: |
    {
      "admin": [
        {
          "username": "admin",
          "password": "Admin@123",
          "email": "admin@example.com",
          "status": 1
        }
      ],
      "users": [
        {
          "username": "vizor",
          "password": "Vizor@123",
          "home_dir": "/srv/sftpgo/data/vizor",
          "uid": 1000,
          "gid": 1000,
          "max_sessions": 10,
          "quota_size": 0,
          "quota_files": 0,
          "permissions": ["*"]
        }
      ]
    }

  extraVolumeMounts:
    - name: sftpgo-config
      mountPath: /etc/sftpgo/config.yml
      subPath: config.yml
    - name: sftpgo-description
      mountPath: /etc/sftpgo/description.json
      subPath: description.json

  extraVolumes:
    - name: sftpgo-config
      configMap:
        name: vizor-sftpgo-config
        items:
          - key: config.yml
            path: config.yml
    - name: sftpgo-description
      configMap:
        name: vizor-sftpgo-description
        items:
          - key: description.json
            path: description.json

