    KC_DB_USERNAME: "sa"
    KC_DB_PASSWORD: "P@55w0rd"
    KC_HTTP_RELATIVE_PATH: "/auth"
  resources:
    requested_memory: "512Mi"
    requested_cpu: "512m"
  #FirstUser
  adminUser:
    email: "ljacoby@roundtables.us"
    firstName: "Admin"
    lastName: "User"
    attributes_clientID: "1"
    password: "Vizor@123"

  realmJson:
    realm: vizor
    enabled: true
    ssoSessionMaxLifespan: 36000
    ssoSessionIdleTimeout: 7200
    accessTokenLifespan: 3600
    editUsernameAllowed: true
    registrationEmailAsUsername: true
    loginWithEmailAllowed: true
    verifyEmail: true
    loginTheme: VizorTheme
    resetPasswordAllowed: true
    passwordPolicy: "length(8) and digits(1) and upperCase(1) and lowerCase(1) and specialChars(1)"
    bruteForceProtected: true
    permanentLockout: true
    failureFactor: 5
    rememberMe: false
