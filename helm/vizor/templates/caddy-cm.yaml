apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: vizor
  labels:
    app: api-proxy
data:
  Caddyfile: |
    :80 {
      # Enable access logs
      log {
        level DEBUG
        output stdout
        format console
      }

      # Keycloak ingress path - preserve /auth prefix
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle /auth* {
        reverse_proxy keycloak:8080 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }

      # Dapr service invocation API
      # All Dapr invocations must go through api-proxy-dapr sidecar
      # Dapr sidecars listen on port 3500 for HTTP API calls
      # The api-proxy-dapr service is created by Dapr and routes to the sidecar
      # This is required because api-proxy is Dapr-enabled and can make service-to-service calls
      handle /v1.0/invoke* {
        reverse_proxy api-proxy-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      # SignalR ChatHub Routing (WebSocket Support)
      # Routes all SignalR ChatHub traffic directly to the interaction-service
      # with ClientIP session affinity. This is critical for WebSocket connections.
      # Caddy automatically handles WebSocket upgrades when reverse_proxy is used
      # Extended timeouts for WebSocket connections to prevent premature closure
      handle /chathub* {
        reverse_proxy {{ .Chart.Name }}-interaction-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          # Extended timeouts for WebSocket connections
          transport http {
            read_timeout 5m
            write_timeout 5m
          }
        }
      }

      # Health check endpoint
      handle /health {
        respond "OK"
      }

      # Everything else falls through to the frontend-host for serving the SPA
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle {
        reverse_proxy vizor-frontend:8000 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }
    }
