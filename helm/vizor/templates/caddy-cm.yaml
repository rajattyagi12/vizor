apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: vizor
  labels:
    app: api-proxy
data:
  Caddyfile: |
    :80 {
      # Enable access logs
      log {
        level DEBUG
        output stdout
        format console
      }

      # Keycloak ingress path - preserve /auth prefix
      handle /auth* {
        reverse_proxy keycloak:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }

      # Dapr service invocation API - preserve full path
      # Routes /v1.0/invoke/* to api-proxy-dapr which handles Dapr invocations
      handle /v1.0/invoke* {
        reverse_proxy api-proxy-dapr:80 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      # SignalR traffic to interaction-service - preserve /chathub prefix
      handle /chathub* {
        reverse_proxy interaction-service-dapr:80 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          # WebSocket support
          header_up Connection {>Connection}
          header_up Upgrade {>Upgrade}
        }
      }

      # Health check endpoint
      handle /health {
        respond "OK"
      }

      # Everything else falls through to the frontend-host for serving the SPA
      handle {
        reverse_proxy vizor-frontend:8000 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }
    }
