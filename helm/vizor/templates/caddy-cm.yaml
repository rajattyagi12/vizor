apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: vizor
  labels:
    app: api-proxy
data:
  Caddyfile: |
    :80 {
      # Enable access logs
      log {
        level DEBUG
        output stdout
        format console
      }

      # Keycloak ingress path - preserve /auth prefix
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle /auth* {
        reverse_proxy keycloak:8080 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }

      # Dapr service invocation API
      # Routes /v1.0/invoke/{service}/method/* to {service}-dapr:3500 (Dapr sidecar port)
      # Extract service name from path and route to the appropriate Dapr sidecar
      handle /v1.0/invoke/core-service* {
        reverse_proxy core-service-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }
      
      handle /v1.0/invoke/interaction-service* {
        reverse_proxy interaction-service-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }
      
      handle /v1.0/invoke/engagement-service* {
        reverse_proxy engagement-service-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }
      
      # Fallback for other Dapr invocations - route to api-proxy-dapr
      handle /v1.0/invoke* {
        reverse_proxy api-proxy-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      # SignalR traffic to interaction-service - preserve /chathub prefix
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle /chathub* {
        reverse_proxy interaction-service-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          # WebSocket support
          header_up Connection {>Connection}
          header_up Upgrade {>Upgrade}
        }
      }

      # Health check endpoint
      handle /health {
        respond "OK"
      }

      # Everything else falls through to the frontend-host for serving the SPA
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle {
        reverse_proxy vizor-frontend:8000 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }
    }
