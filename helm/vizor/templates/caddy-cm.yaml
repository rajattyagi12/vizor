apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: vizor
  labels:
    app: api-proxy
data:
  Caddyfile: |
    {
      tracing {
        endpoint http://jaeger-inmemory-instance-collector.observability.svc.k8s.nbt:4318
        service_name caddy-gateway
      }

      logging {
        level DEBUG
        logs {
          default {
            level DEBUG
            output stdout
          }
        }
      }


      :80 {
        reverse_proxy localhost:3500
              # Optional health check
            respond /health "OK"
      }
    }
