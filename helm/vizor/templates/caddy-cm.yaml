apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: vizor
  labels:
    app: api-proxy
data:
  Caddyfile: |
    :80 {
      # Enable access logs
      log {
        level DEBUG
        output stdout
        format console
      }

      # Keycloak ingress path - preserve /auth prefix
      # Add CORS headers for authentication requests
      handle /auth* {
        # Handle CORS preflight requests
        @cors_preflight method OPTIONS
        handle @cors_preflight {
          header Access-Control-Allow-Origin {http.request.header.Origin}
          header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
          header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
          header Access-Control-Allow-Credentials "true"
          header Access-Control-Max-Age "3600"
          respond 204
        }
        
        reverse_proxy keycloak:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          
          # Add CORS headers to proxied responses
          header_down Access-Control-Allow-Origin {http.request.header.Origin}
          header_down Access-Control-Allow-Credentials "true"
          header_down Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
          header_down Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-Forwarded-For, X-Real-IP"
        }
      }

      # Dapr HTTP API endpoints
      # Route all Dapr API calls to the api-proxy-dapr sidecar
      # Dapr sidecars listen on port 3500 for HTTP API calls
      # The api-proxy-dapr service is created by Dapr and routes to the sidecar
      # This includes:
      # - /v1.0/invoke* - Service invocation
      # - /dapr/config - Dapr configuration
      # - /dapr/subscribe - Pub/sub subscription discovery
      # - /v1.0/* - Other Dapr API endpoints
      handle /v1.0/* {
        reverse_proxy api-proxy-dapr:3500 {
          header_up Host 127.0.0.1
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      handle /dapr/* {
        reverse_proxy api-proxy-dapr:3500 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      # SignalR ChatHub Routing (WebSocket Support)
      # Routes all SignalR ChatHub traffic directly to the interaction-service
      # with ClientIP session affinity. This is critical for WebSocket connections.
      # Caddy automatically handles WebSocket upgrades when reverse_proxy is used
      # No need to explicitly set Connection/Upgrade headers - Caddy handles this
      # Extended timeouts for WebSocket connections
      # Prevents premature connection closure during idle periods
      handle /chathub* {
        reverse_proxy {{ .Chart.Name }}-interaction-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          # Extended timeouts for WebSocket connections
          transport http {
            read_timeout 5m
            write_timeout 5m
          }
        }
      }

      # Health check endpoint
      handle /health {
        respond "OK"
      }

      # Everything else falls through to the frontend-host for serving the SPA
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle {
        reverse_proxy vizor-frontend:8000 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }
    }
