{{- if .Values.components.apps.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-proxy
data:
  Caddyfile: |
    {
      # Expose Caddy admin API and metrics endpoint for scraping.
      admin :2019
      metrics
    }

    :80 {
      # Enable access logs
      log {
        level DEBUG
        output stdout
        format console
      }
      # SAML Callback Routing (Bypass Dapr and Keycloak)
      # Route SAML callback directly to core-service
      # This is necessary because SAML callback is handled by core-service AuthController
      # Must be before the general /auth* route to take precedence
      handle /api/auth/saml/callback {
        reverse_proxy {{ .Chart.Name }}-core-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          header_up X-Forwarded-Proto https
        }
      }

      # Keycloak Authentication Routing
      # All other /auth* routes go to Keycloak
      handle /auth* {
        reverse_proxy keycloak:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          header_up X-Forwarded-Proto https
        }
      }

      
      # Dapr service invocation API
      # All Dapr invocations must go through api-proxy-dapr sidecar
      # Dapr sidecars listen on port 3500 for HTTP API calls
      # The api-proxy-dapr service is created by Dapr and routes to the sidecar
      # This is required because api-proxy is Dapr-enabled and can make service-to-service calls
      handle /v1.0/invoke* {
        reverse_proxy api-proxy-dapr:3500 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
        tracing {
        }
      }

      # SignalR ChatHub Routing (WebSocket Support)
      # Route all SignalR HTTP + WebSocket traffic directly to interaction-service
      # Dapr is still used by the service for state + pub/sub via DaprClient
      # Extended timeouts prevent premature WebSocket closure
      handle /chathub* {
        reverse_proxy {{ .Chart.Name }}-interaction-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          transport http {
            read_timeout 5m
            write_timeout 5m
          }
        }
      }

      handle /alerthub* {
        reverse_proxy {{ .Chart.Name }}-interaction-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          transport http {
            read_timeout 5m
            write_timeout 5m
          }
        }
      }

     # SAML Authentication Routing (Bypass Dapr)
      # Route all SAML traffic directly to core-service
      # This is necessary because:
      # - SAML ACS endpoint requires maintaining session state
      # - Dapr routing can cause session affinity issues
      # - Direct routing ensures SAML callbacks hit the same pod
      # HTTPS is terminated at Ingress level, internal communication uses HTTP
      handle /api/auth/acs {
        reverse_proxy {{ .Chart.Name }}-core-service:8080 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
          header_up X-Forwarded-Proto https
        }
      }


      # Health check endpoint
      handle /health {
        respond "OK"
      }

      # Everything else falls through to the frontend-host for serving the SPA
      # Use 127.0.0.1 for Host header to avoid DNS resolution issues
      handle {
        reverse_proxy vizor-frontend:8000 {
          header_up Host {host}
          header_up X-Forwarded-For {remote}
          header_up X-Real-IP {remote}
        }
      }
    }
{{- end }}
