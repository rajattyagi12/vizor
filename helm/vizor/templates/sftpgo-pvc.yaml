{{- if .Values.sftpgo.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vizor.fullname" . }}-sftpgo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.sftpgo.persistence.size }}
  storageClassName: {{ .Values.sftpgo.persistence.storageClass | quote }}
{{- end }}
