apiVersion: v1
kind: Namespace
metadata:
  name: vizor-keycloak
---
apiVersion: v1
kind: Secret
metadata:
  name: mssql-secret
  namespace: vizor-keycloak
type: Opaque
stringData:
  SA_PASSWORD: "YourStrong!Passw0rd"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mssql-pv
  namespace: vizor-keycloak
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data/mssql"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-pvc
  namespace: vizor-keycloak
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql
  namespace: vizor-keycloak
spec:
  selector:
    matchLabels:
      app: mssql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
              name: mssql
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: SA_PASSWORD
          volumeMounts:
            - name: mssql-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: mssql-storage
          persistentVolumeClaim:
            claimName: mssql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mssql
  namespace: vizor-keycloak
spec:
  selector:
    app: mssql
  ports:
    - port: 1433
      targetPort: 1433
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mssql-init-job
  namespace: vizor-keycloak
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-mssql
          image: mcr.microsoft.com/mssql-tools
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for MSSQL to become available..."
              until /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$SA_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
                echo "Still waiting..."
                sleep 3
              done
              echo "Connected. Creating databases..."
              /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P "$SA_PASSWORD" -Q "IF NOT EXISTS(SELECT name FROM sys.databases WHERE name='keycloak') CREATE DATABASE keycloak;"
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql-secret
                  key: SA_PASSWORD
