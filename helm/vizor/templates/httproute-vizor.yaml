{{- if and .Values.components.trafficAutoscale.enabled .Values.gateway.name }}
---
# Gateway API HTTPRoute — main Vizor app via Caddy api-proxy. Replaces Ingress when gateway is set.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}-app
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.http | default "web" }}
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.listeners.https | default "websecure" }}
  {{- $publicHost := regexReplaceAll "^https?://" .Values.ingress.publicHost "" }}
  {{- if or .Values.ingress.host $publicHost }}
  hostnames:
    {{- if .Values.ingress.host }}
    - "{{ .Values.ingress.host }}"
    {{- end }}
    {{- if $publicHost }}
    - "{{ $publicHost }}"
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: keycloak
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-proxy
          port: 80
{{- end }}
