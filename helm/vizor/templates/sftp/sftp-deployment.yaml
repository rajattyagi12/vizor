{{- if .Values.sftp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-sftp
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    app: sftp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftp
  template:
    metadata:
      labels:
        app: sftp
        {{- include "vizor.selectorLabels" . | nindent 8 }}
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/hostname: nuage-cluster-control-plane
      containers:
        - name: sftp
          image: {{ .Values.sftp.image.registry | default "docker.io" }}/{{ .Values.sftp.image.repo }}:{{ .Values.sftp.image.tag }}
          resources:
            {{- toYaml .Values.sftp.resources | nindent 12 }}
          volumeMounts:
            - name: sftp-data
              mountPath: /home/user1
          env:
            - name: SFTP_USERS
              valueFrom:
                secretKeyRef:
                  name: sftp-secret
                  key: sftp_users
      volumes:
        - name: sftp-data
          persistentVolumeClaim:
            claimName: {{ .Values.sftp.persistence.existingClaim }}
---
apiVersion: v1
kind: Service
metadata:
  name: sftp
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
spec:
  selector:
    app: sftp
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
      {{- if eq .Values.sftp.service.type "NodePort" }}
      nodePort: {{ .Values.sftp.service.nodePort }}
      {{- end }}
  type: {{ .Values.sftp.service.type }}
{{- end }}