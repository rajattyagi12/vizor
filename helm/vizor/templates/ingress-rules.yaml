{{- $tlsEnabled := (or .Values.ingress.certIssuer .Values.ingress.certName) -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress-rules
  annotations:
    # Caddy handles all routing internally, so we just route all traffic to Caddy
    # Remove nginx-specific annotations as we're using Caddy now
    {{ if .Values.ingress.certIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certIssuer }}
    {{ end }}
spec:
  # Ingress class can be specified if using a Caddy ingress controller
  # Otherwise, this ingress routes to the Caddy service directly
  {{ if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{ end }}
  {{ if $tlsEnabled }}
  tls:
  - hosts:
    - "{{ .Values.ingress.host }}"
    {{ if .Values.ingress.certName }}
    secretName: {{ .Values.ingress.certName }}
    {{ else }}
    secretName: {{ include "daprstore.fullname" . }}
    {{ end }}
  {{ end }}
  rules:
    {{ if .Values.ingress.host }}
    - host: "{{ .Values.ingress.host }}"
      http:
    {{ else }}
    - http:
    {{ end }}
        paths:
          # All traffic routes to Caddy, which handles internal routing
          # Caddy routes:
          #   /auth* -> keycloak:8080
          #   /v1.0/invoke/{service}/method/* -> {service}-dapr:3500
          #   /chathub* -> interaction-service-dapr:80
          #   / -> vizor-frontend:8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-proxy
                port:
                  number: 80

