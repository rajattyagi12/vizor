{{- $tlsEnabled := (or .Values.ingress.certIssuer .Values.ingress.certName) -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress-rules
  annotations:
    # Using Caddy-compatible ingress (no nginx-specific annotations)
    # All service connections are defined below for visibility in ArgoCD
    {{ if .Values.ingress.certIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certIssuer }}
    {{ end }}
spec:
  # Ingress class can be specified if using a Caddy ingress controller
  # Otherwise, this ingress routes to the Caddy service directly
  {{ if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{ end }}
  {{ if $tlsEnabled }}
  tls:
  - hosts:
    - "{{ .Values.ingress.host }}"
    {{ if .Values.ingress.certName }}
    secretName: {{ .Values.ingress.certName }}
    {{ else }}
    secretName: {{ include "daprstore.fullname" . }}
    {{ end }}
  {{ end }}
  rules:
    {{ if .Values.ingress.host }}
    - host: "{{ .Values.ingress.host }}"
      http:
    {{ else }}
    - http:
    {{ end }}
        paths:
          # Keycloak ingress path
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # Dapr service invocation API - routes to api-proxy-dapr
          - path: /v1.0/invoke
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-proxy-dapr
                port:
                  number: 80
          # SignalR traffic to interaction-service
          - path: /chathub
            pathType: Prefix
            backend:
              service:
                name: interaction-service-dapr
                port:
                  number: 80
          # Everything else falls through to the frontend-host for serving the SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vizor-frontend
                port:
                  number: 8000

