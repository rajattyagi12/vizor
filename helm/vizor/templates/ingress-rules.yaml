{{- if .Values.ingress.enabled }}
{{- $tlsEnabled := (or .Values.ingress.certIssuer .Values.ingress.certName) -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress-rules
  annotations:
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    nginx.ingress.kubernetes.io/client-max-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "100m"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"

    {{ if .Values.ingress.certIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certIssuer }}
    {{ end }}
    {{ if $tlsEnabled }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{ else }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    {{ end }}
spec:
  # Let Ingress class be specified
  ingressClassName: {{ .Values.ingress.className }}
  {{ if $tlsEnabled }}
  tls:
  - hosts:
    - "{{ .Values.ingress.host }}"
    {{ if .Values.ingress.certName }}
    secretName: {{ .Values.ingress.certName }}
    {{ else }}
    secretName: {{ include "daprstore.fullname" . }}
    {{ end }}
  {{ end }}
  rules:
    {{ if .Values.ingress.host }}
    - host: "{{ .Values.ingress.host }}"
      http:
    {{ else }}
    - http:
    {{ end }}
        paths:
         

        #Keycloak ingress path
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          # Only expose the Dapr invoke API, lets us call our services and nothing more
          - path: /v1.0/invoke
            pathType: ImplementationSpecific
            backend:
              service:
                # Send to the Dapr sidecar, which exposes the Dapr invoke API
                name: api-proxy-dapr
                port:
                  number: 80
           # NEW — route SignalR traffic to your interaction-service
          - path: /chathub
            pathType: Prefix
            backend:
              service:
                # Route SignalR traffic through the API gateway (Caddy via Dapr)
                name: api-proxy-dapr
                port:
                  number: 80
          # Everything else falls through to the frontend-host for serving the SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vizor-frontend
                port:
                  number: 8000
{{- end }}