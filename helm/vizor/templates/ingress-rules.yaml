{{- $tlsEnabled := (or .Values.ingress.certIssuer .Values.ingress.certName) -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress-rules
  namespace: vizor
  annotations:
    # Caddy-based ingress gateway - routes all traffic to Caddy service
    # Caddy handles internal routing to all services and Dapr services
    {{ if .Values.ingress.certIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certIssuer }}
    {{ end }}
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  {{ if $tlsEnabled }}
  tls:
  - hosts:
    - "{{ .Values.ingress.host }}"
    {{ if .Values.ingress.certName }}
    secretName: {{ .Values.ingress.certName }}
    {{ else }}
    secretName: {{ include "daprstore.fullname" . }}
    {{ end }}
  {{ end }}
  rules:
    # Main application gateway - connects directly to host URL/IP
    # Similar to mailhog-ingress which connects to mailhog.k8s.nbt.local
    # Flow: External Traffic (URL/IP) → Ingress → Caddy Gateway (api-proxy) → Services
    {{ if .Values.ingress.host }}
    - host: "{{ .Values.ingress.host }}"
      http:
    {{ else }}
    - http:
    {{ end }}
        paths:
          # All traffic routes to Caddy gateway (api-proxy service)
          # Caddy acts as the application gateway and routes to:
          #   /auth* -> keycloak:8080 (Keycloak service)
          #   /v1.0/invoke* -> api-proxy-dapr:80 (Dapr service invocations)
          #   /chathub* -> interaction-service-dapr:80 (SignalR via Dapr)
          #   / -> vizor-frontend:8000 (Frontend SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-proxy
                port:
                  number: 80

