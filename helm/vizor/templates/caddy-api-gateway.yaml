apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-proxy
  namespace: vizor
  labels:
    purpose: "vizor-api-gateway"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-proxy
  template:
    metadata:
      labels:
        app: api-proxy
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "api-proxy"
        dapr.io/app-port: "80"
        dapr.io/sidecar-listen-addresses: "0.0.0.0"
    spec:
      containers:
        - name: caddy
          image: caddy:latest
          ports:
            - containerPort: 80
