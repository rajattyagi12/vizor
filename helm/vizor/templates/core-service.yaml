apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-core-service
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: core-service
spec:
  replicas: {{ .Values.coreService.replicas }}
  selector:
    matchLabels:
      vizor: core-service
  template:
    metadata:
      labels:
        vizor: core-service
        {{- include "vizor.selectorLabels" . | nindent 8 }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "core-service"
        dapr.io/app-port: "9001"
      {{- with .Values.coreService.annotations }}
          {{- toYaml . | nindent 8 }}
      {{- end }}            
    spec:
    {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}    

      containers:
      - name: server
        image: {{ .Values.image.registry }}/{{ .Values.image.repo }}/core-service:{{ .Values.image.tag }}
        imagePullPolicy: Always
        
        {{- if .Values.auth.clientId }}
        env:
          - name: AUTH_CLIENT_ID
            value: {{ .Values.auth.clientId }}
        {{- end }}
           
        resources:
        {{- with .Values.resources }}
          {{- toYaml . | nindent 12 }}
        {{- end }}

        readinessProbe:
          httpGet:
            path: /health
            port: 9001
            httpHeaders:
              - name: "No-Log"
                value: "true"
