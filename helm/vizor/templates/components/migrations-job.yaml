apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrations
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: migrations
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "5"
    # argocd.argoproj.io/hook-delete-policy: HookSucceeded
    "helm.sh/hook": pre-upgrade,post-install
    "helm.sh/hook-delete-policy": hook-succeeded
    "helm.sh/hook-weight": "10"
spec:
  ttlSecondsAfterFinished: 30 # keeps the Job visible only for 60 seconds
  backoffLimit: 4
  template:
    metadata:
      labels:
        vizor: migrations
        {{- include "vizor.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: {{ .Values.image.registry }}/{{ .Values.image.repo }}/ef-core-migration:{{ .Values.image.tag }}
          imagePullPolicy: Always
          env:
            - name: {{ if .Values.useMigrationSql }}MSSQL_CONNECTION_STRING{{ else }}ConnectionStrings__DefaultConnection{{ end }}
              valueFrom:
                secretKeyRef:
                  name: vizor-secrets
                  key: connectionString
          workingDir: {{ if .Values.useMigrationSql }}/app{{ else }}/app/DotNetScaffolding{{ end }}
          command: {{ if .Values.useMigrationSql }}["/bin/bash", "-c"]{{ else }}["/bin/sh", "-c"]{{ end }}
