{{- if .Values.daprComponents.deploy }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.daprComponents.secretStore.secretName }}
type: Opaque
data:
  {{- range $key, $val := .Values.daprComponents.secrets }}
  {{ $key }}: {{ $val | b64enc }}
  {{- end }}
  {{- $connectionString := printf "Data Source=%s,%.0f;Initial Catalog=%s;User Id=%s;Password=%s;Trust Server Certificate=True;Authentication=SqlPassword;" .Values.sqlServer.service.name .Values.sqlServer.service.port .Values.sqlServer.database .Values.sqlServer.username .Values.sqlServer.dbPassword }}
  connectionString: {{ $connectionString | b64enc }}
  postgresUser: {{ .Values.postgresql.username | b64enc }}
  postgresPassword: {{ .Values.postgresql.dbPassword | b64enc }}
  SA_USERNAME: {{ .Values.sqlServer.username | b64enc }}
  SA_PASSWORD: {{ .Values.sqlServer.dbPassword | b64enc }}
  sftpPassword: {{ .Values.daprComponents.sftp.password }} | b64enc }}
{{- end }}

---

{{- if .Values.daprComponents.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
{{- end}}

---

{{- if .Values.daprComponents.deploy }}

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vizor-secret-reader
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io

{{- end}}
