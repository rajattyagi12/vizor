{{- if and .Values.components.foundation.enabled .Values.daprComponents.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
{{- end}}

---

{{- if and .Values.components.foundation.enabled .Values.daprComponents.deploy }}

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vizor-secret-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "vizor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io

{{- end}}


{{- if .Values.ecr.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: ecr-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.ecr.dockerconfigjson | quote }}
{{- end }}
