{{- if .Values.components.identity.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-init
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 600 # Allow Job to exist for ArgoCD to discover completion
  # backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ include "vizor.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: realm-init
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl jq

              until curl -sf http://keycloak:8080/auth/realms/master; do
                echo "Waiting for Keycloak to be ready..."
                sleep 5
              done
              echo "Debug: raw token response:"
              curl -s \
                -d "client_id=admin-cli" \
                -d "username=$KEYCLOAK_ADMIN" \
                -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
                -d "grant_type=password" \
                http://keycloak:8080/auth/realms/master/protocol/openid-connect/token

              echo "Keycloak is ready. Getting admin token..."
              TOKEN=$(curl -s \
                -d "client_id=admin-cli" \
                -d "username=$KEYCLOAK_ADMIN" \
                -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
                -d "grant_type=password" \
                http://keycloak:8080/auth/realms/master/protocol/openid-connect/token | jq -r '.access_token')

              if [ -z "$TOKEN" ]; then
                echo "Failed to get token"
                exit 1
              fi

              echo "Debug: raw profile response:"
              curl -s \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/profile
              echo "Configuring user profile for custom attribute: clientID"
              PROFILE=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/profile)

              UPDATED_PROFILE=$(echo "$PROFILE" | jq '
                .attributes |= (
                  map(
                    if .name == "firstName" or .name == "lastName" then
                      . + {
                        validations: {
                          pattern: {
                            pattern: "^[A-Za-z0-9\\s\\-\\.]{1,50}$"
                          }
                        }
                      }
                    else .
                    end
                  )
                  + [
                    {
                      "name": "clientID",
                      "displayName": "ClientID",
                      "required": { "roles": ["user"] },
                      "permissions": { "view": ["admin"], "edit": ["admin"] },
                      "multivalued": false,
                      "validations": {
                        "integer": {}
                      }
                    }
                  ]
                )
              ')

              curl -s -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$UPDATED_PROFILE" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/profile || echo "User profile may already be set"

              echo "Creating client scope: $CLIENT_SCOPE"
              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"name\": \"$CLIENT_SCOPE\",
                  \"protocol\": \"openid-connect\",
                  \"attributes\": {
                    \"include.in.token.scope\": \"true\",
                    \"display.on.consent.screen\": \"false\",
                    \"consent.screen.text\": \"\",
                    \"gui.order\": \"0\"
                  }
                }" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/client-scopes || echo "Client scope may already exist"

              echo "Adding mapper to client scope"
              CLIENT_SCOPE_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/client-scopes | jq -r ".[] | select(.name==\"$CLIENT_SCOPE\") | .id")

              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"name\": \"ClientID\",
                  \"protocol\": \"openid-connect\",
                  \"protocolMapper\": \"oidc-usermodel-attribute-mapper\",
                  \"consentRequired\": false,
                  \"config\": {
                    \"user.attribute\": \"clientID\",
                    \"claim.name\": \"ClientID\",
                    \"id.token.claim\": \"true\",
                    \"access.token.claim\": \"true\",
                    \"userinfo.token.claim\": \"true\",
                    \"access.tokenResponse.claim\": \"true\",
                    \"lightweight.claim\": \"true\",
                    \"multivalued\": \"false\"
                  }
                }" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/client-scopes/$CLIENT_SCOPE_ID/protocol-mappers/models || echo "Mapper may already exist"

              echo "Assigning client scope to client as DEFAULT"
              CLIENT_UUID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/clients | jq -r ".[] | select(.clientId==\"$CLIENT_ID\") | .id")

              curl -s -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"id\": \"$CLIENT_SCOPE_ID\",
                  \"name\": \"$CLIENT_SCOPE\",
                  \"optional\": false
                }" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/clients/$CLIENT_UUID/default-client-scopes/$CLIENT_SCOPE_ID || echo "Scope may already be assigned"

              # echo "Configuring SMTP settings for realm..."
              curl -s -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"smtpServer\": {
                    \"host\": \"$SMTP_HOST\",
                    \"port\": \"$SMTP_PORT\",
                    \"from\": \"$ADMIN_EMAIL\",
                    \"fromDisplayName\": \"$MAILDISPLAYNAME\",
                    \"replyTo\": \"$ADMIN_EMAIL\",
                    \"replyToDisplayName\": \"$MAILDISPLAYNAME\",
                    \"starttls\": \"$SMTP_STARTTLS\",
                    \"auth\": \"$SMTP_AUTH\",
                    \"user\": \"$SMTP_USERNAME\",
                    \"password\": \"$SMTPPASSWORD\"
                  }
                }" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME || echo "SMTP may already be set"


              #Update master realm "admin" user's email
              echo "Updating master realm admin user's email..."
              ADMIN_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "http://keycloak:8080/auth/admin/realms/master/users?username=admin" \
                | jq -r '.[0].id')

              if [ -n "$ADMIN_ID" ]; then
                curl -s -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"email\": \"$ADMIN_EMAIL\",
                    \"emailVerified\": true
                  }" \
                  http://keycloak:8080/auth/admin/realms/master/users/$ADMIN_ID || echo "Failed to update admin email"
              else
                echo "Admin user not found in master realm!"
              fi

              echo "Creating user ljacoby@roundtables.us ...Make the firstname dynamic"
              CREATE_OUTPUT=$(curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"username\": \"$ADMIN_USER_EMAIL\",
                  \"email\": \"$ADMIN_USER_EMAIL\",
                  \"firstName\": \"$ADMIN_USER_FIRSTNAME\",
                  \"lastName\": \"$ADMIN_USER_LASTNAME\",
                  \"enabled\": true,
                  \"emailVerified\": true,
                  \"attributes\": {
                    \"clientID\": [\"$ADMIN_USER_ATTRIBUTES_CLIENTID\"]
                  }
                }" \
                "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users" 2>&1)

              #Get the created user's ID
              USER_ID=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/users?username=ljacoby@roundtables.us | jq -r '.[0].id')

              #SET ADMIN-USER PASSWORD
              if [ -n "$USER_ID" ]; then
                echo "Setting password for user..."
                curl -s -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"type\": \"password\",
                    \"value\": \"$ADMIN_USER_PASSWORD_REALM\",
                    \"temporary\": false
                  }" \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/reset-password || echo "Failed to set password"
              fi
              if echo "$CREATE_OUTPUT" | grep -qi "User exists with same email"; then
                echo "User may already exist — skipping creation and update steps."
              else
                echo "User created successfully or proceeding with setup..."

                # Fetch current user representation (show and save)
                echo "Fetching user JSON..."
                USER_JSON=$(curl -s -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID")

                if [ -z "$USER_JSON" ] || [ "$USER_JSON" = "null" ]; then
                  echo "ERROR: failed to fetch user JSON (empty)."
                  exit 1
                fi

                echo "Current requiredActions:"
                echo "$USER_JSON" | jq -r '.requiredActions // [] | @json'

                # Ensure requiredActions contains CONFIGURE_TOTP (idempotent)
                UPDATED_USER_JSON=$(echo "$USER_JSON" | jq '
                  .requiredActions = ((.requiredActions // []) + ["CONFIGURE_TOTP"] | unique)
                ')

                # Preview diff-ish info
                echo "Preview - requiredActions after update:"
                echo "$UPDATED_USER_JSON" | jq -r '.requiredActions | @json'

                # PUT updated user representation back and capture HTTP status
                echo "Putting updated user representation (this will update requiredActions)..."
                PUT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$UPDATED_USER_JSON" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID" || echo "000")

                echo "PUT HTTP status: $PUT_STATUS"

                if [ "$PUT_STATUS" != "204" ] && [ "$PUT_STATUS" != "200" ]; then
                  echo "PUT failed (non-2xx). Attempting fallback: execute-actions-email (will trigger email if SMTP configured)."
                  SEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d '["CONFIGURE_TOTP"]' \
                    "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/execute-actions-email" || echo "000")
                  echo "execute-actions-email HTTP status: $SEND_STATUS"
                fi
              fi

              #REMOVE DEFAULT ROLES
              echo "Removing default roles from admin user..."
              DEFAULT_ROLE=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/roles/default-roles-$REALM_NAME | jq -c '{id: .id, name: .name}')

              if [ -n "$USER_ID" ] && [ -n "$DEFAULT_ROLE" ]; then
                curl -s -X DELETE \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "[$DEFAULT_ROLE]" \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/role-mappings/realm || echo "Failed to remove default roles"
              fi

              #Fetch role object for the role to assign
              ROLE_OBJ=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/roles/$ROLE_NAME \
                | jq -c '{id: .id, name: .name}')

              #Assign only that role
              if [ -n "$ROLE_OBJ" ]; then
                echo "Assigning role $ROLE_NAME to admin user..."
                curl -s -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "[$ROLE_OBJ]" \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/role-mappings/realm
              else
                echo "Role $ROLE_NAME not found in realm!"
              fi

              echo "Creating custom browser flow and requiring OTP..."

              CUSTOM_BROWSER="custom-browser"
              echo "Duplicating built-in browser flow to $CUSTOM_BROWSER..."
              COPY_RESP=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"newName": "'"$CUSTOM_BROWSER"'"}' \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/browser/copy)
              
              HTTP_CODE=$(echo "$COPY_RESP" | tail -n1)
              if [ "$HTTP_CODE" = "409" ]; then
                echo "Flow $CUSTOM_BROWSER already exists. Proceeding with existing flow..."
              fi

              echo "Getting executions for $CUSTOM_BROWSER flow..."
              NEW_EXECUTIONS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/$CUSTOM_BROWSER/executions)

              # Check if we got valid JSON response
              if ! echo "$NEW_EXECUTIONS" | jq -e . > /dev/null 2>&1; then
                echo "ERROR: Invalid JSON response from newly copied flow API:"
                echo "Response: $NEW_EXECUTIONS"
                exit 1
              fi

              # Find the Conditional 2FA step (it might be renamed if sub-flows take parent prefix, so check contains)
              CONDITIONAL_2FA_ID=$(echo "$NEW_EXECUTIONS" | jq -r '.[] | select(.displayName | contains("Conditional 2FA")) | .id' | head -n 1)

              if [ -n "$CONDITIONAL_2FA_ID" ] && [ "$CONDITIONAL_2FA_ID" != "null" ]; then
                echo "Removing Conditional 2FA step (ID: $CONDITIONAL_2FA_ID)..."
                curl -s -X DELETE \
                  -H "Authorization: Bearer $TOKEN" \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/executions/$CONDITIONAL_2FA_ID
                
                echo "Fetching updated executions after deletion..."
                NEW_EXECUTIONS=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/$CUSTOM_BROWSER/executions)
              else
                echo "Conditional 2FA step not found, may already be removed."
              fi

              # Keycloak names the forms sub-flow as "<parent-alias> forms" when copying.
              # Derive the alias directly to avoid jq string-interpolation escaping issues in YAML.
              FORMS_FLOW_ALIAS="${CUSTOM_BROWSER} forms"
              FORMS_FLOW_ALIAS_ENCODED=$(echo "$FORMS_FLOW_ALIAS" | sed 's/ /%20/g')

              echo "Forms subflow alias: $FORMS_FLOW_ALIAS"

              # Check if OTP Form already exists inside the forms subflow
              NEW_OTP_ID=$(echo "$NEW_EXECUTIONS" | jq -r '.[] | select(.displayName=="OTP Form") | .id' | head -n 1)
              OTP_JUST_ADDED=0

              if [ -z "$NEW_OTP_ID" ] || [ "$NEW_OTP_ID" = "null" ]; then
                echo "Adding OTP Form to subflow: $FORMS_FLOW_ALIAS..."
                curl -s -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"provider": "auth-otp-form"}' \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/$FORMS_FLOW_ALIAS_ENCODED/executions/execution" \
                  || echo "OTP Form may already be added"

                OTP_JUST_ADDED=1

                echo "Fetching updated executions to get new OTP Form ID..."
                NEW_EXECUTIONS=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/$CUSTOM_BROWSER/executions")

                NEW_OTP_ID=$(echo "$NEW_EXECUTIONS" | jq -r '.[] | select(.displayName=="OTP Form") | .id' | head -n 1)
              else
                echo "OTP Form already present, skipping addition."
              fi

              if [ -n "$NEW_OTP_ID" ] && [ "$NEW_OTP_ID" != "null" ]; then
                echo "Setting OTP Form (ID: $NEW_OTP_ID) requirement to REQUIRED..."
                curl -s -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"id":"'"$NEW_OTP_ID"'","requirement":"REQUIRED"}' \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/$CUSTOM_BROWSER/executions"

                # Ensure OTP Form comes AFTER Username Password Form inside the sub-flow.
                if [ "$OTP_JUST_ADDED" = "1" ]; then
                  # Keycloak always inserts new executions at the TOP of the sub-flow.
                  # We know the order is wrong — call lower-priority unconditionally.
                  echo "OTP Form was just added (inserted at top) — calling lower-priority to place it after Username Password Form..."
                  curl -s -X POST \
                    -H "Authorization: Bearer $TOKEN" \
                    "http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/executions/$NEW_OTP_ID/lower-priority"
                  echo "Order corrected: Username Password Form → OTP Form"
                else
                  # Re-run / idempotent path: check actual index before adjusting.
                  OTP_INDEX=$(echo "$NEW_EXECUTIONS" | jq -r '.[] | select(.displayName=="OTP Form") | .index')
                  PWD_INDEX=$(echo "$NEW_EXECUTIONS" | jq -r '.[] | select(.displayName=="Username Password Form") | .index')
                  echo "Order check (re-run) — OTP Form index: $OTP_INDEX, Username Password Form index: $PWD_INDEX"
                  if [ -n "$OTP_INDEX" ] && [ -n "$PWD_INDEX" ] && [ "$OTP_INDEX" -lt "$PWD_INDEX" ] 2>/dev/null; then
                    echo "OTP Form is above Username Password Form — calling lower-priority to fix order..."
                    curl -s -X POST \
                      -H "Authorization: Bearer $TOKEN" \
                      "http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/executions/$NEW_OTP_ID/lower-priority"
                    echo "Order corrected: Username Password Form → OTP Form"
                  else
                    echo "Order is already correct — no adjustment needed."
                  fi
                fi
              else
                echo "ERROR: Could not find OTP Form execution to set as REQUIRED"
              fi

              echo "Binding $CUSTOM_BROWSER as the default browser flow for the realm..."
              curl -s -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"realm\": \"$REALM_NAME\",
                  \"browserFlow\": \"$CUSTOM_BROWSER\"
                }" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME || echo "Failed to update realm browser flow"

              echo "Browser flow updated successfully."

              echo "Updating reset credentials flow to DISABLE OTP..."

              # Get all executions under the Reset Credentials flow
              echo "Getting reset credentials flow executions..."
              EXECUTIONS_RESET=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/reset%20credentials/executions)

              # Check if we got valid JSON response
              if ! echo "$EXECUTIONS_RESET" | jq -e . > /dev/null 2>&1; then
                echo "ERROR: Invalid JSON response from reset credentials flow API:"
                echo "Response: $EXECUTIONS_RESET"
                exit 1
              fi

              # Debug: print all execution names
              echo "Available executions in Reset Credentials flow:"
              echo "$EXECUTIONS_RESET" | jq -r '.[].displayName'

              # Find the Reset OTP execution
              OTP_ID_RESET=$(echo "$EXECUTIONS_RESET" | jq -r '.[] | select(.displayName=="Reset OTP") | .id')

              if [ -z "$OTP_ID_RESET" ] || [ "$OTP_ID_RESET" = "null" ]; then
                echo "Failed to find Reset OTP execution in reset credentials flow"
                echo "Available display names:"
                echo "$EXECUTIONS_RESET" | jq -r '.[].displayName // "unnamed"'
                exit 1
              fi

              echo "Setting Reset OTP requirement to DISABLED in reset credentials flow..."
              curl -s -X PUT \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"id":"'"$OTP_ID_RESET"'","requirement":"DISABLED"}' \
                http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/reset%20credentials/executions

              # Find the Reset - Conditional OTP execution
              CONDITIONAL_OTP_ID=$(echo "$EXECUTIONS_RESET" | jq -r '.[] | select(.displayName=="Reset - Conditional OTP") | .id')

              if [ -n "$CONDITIONAL_OTP_ID" ] && [ "$CONDITIONAL_OTP_ID" != "null" ]; then
                echo "Setting Reset - Conditional OTP requirement to DISABLED in reset credentials flow..."
                curl -s -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"id":"'"$CONDITIONAL_OTP_ID"'","requirement":"DISABLED"}' \
                  http://keycloak:8080/auth/admin/realms/$REALM_NAME/authentication/flows/reset%20credentials/executions
              else
                echo "Reset - Conditional OTP execution not found, skipping disable."
              fi

              echo "Reset credentials flow updated successfully."
              echo "Realm, client, roles, user attribute, client scope, mapper, and authentication flows setup complete."
          env:
            - name: REALM_NAME
              value: {{ .Values.keycloakRealmConfiguration.realmName | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD }}
            - name: CLIENT_ID
              value: {{ .Values.keycloakRealmConfiguration.clientId | quote }}
            - name: ROLE_NAME
              value: {{ .Values.keycloakRealmConfiguration.roleName | quote }}
            - name: CLIENT_SCOPE
              value: {{ .Values.keycloakRealmConfiguration.clientScope | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.keycloakRealmConfiguration.adminEmail | quote }}
            # SMTP: from Secret (single source: vizor-secrets daprComponents.secrets)
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtp-host
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtp-port
            - name: SMTP_STARTTLS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtp-starttls
            - name: SMTP_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtp-auth
            - name: MAILDISPLAYNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtp-mail-display-name
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtpusername
            - name: SMTPPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.daprComponents.secretStore.secretName | default "vizor-secrets" }}
                  key: smtppassword
            - name: ADMIN_USER_EMAIL
              value: {{ .Values.keycloakRealmConfiguration.adminUser.email | quote }}
            - name: ADMIN_USER_FIRSTNAME
              value: {{ .Values.keycloakRealmConfiguration.adminUser.firstName | quote }}
            - name: ADMIN_USER_LASTNAME
              value: {{ .Values.keycloakRealmConfiguration.adminUser.lastName | quote }}
            - name: ADMIN_USER_ATTRIBUTES_CLIENTID
              value: {{ .Values.keycloakRealmConfiguration.adminUser.attributes_clientID | quote }}
            - name: ADMIN_USER_PASSWORD_REALM
              value: {{ .Values.keycloakRealmConfiguration.adminUser.password | quote }}
{{- end }}
