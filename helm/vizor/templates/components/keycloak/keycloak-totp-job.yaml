apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-totp-init
  namespace: vizor
  annotations:
    "helm.sh/hook": post-install,post-upgrade  # Run after install/upgrade
    "helm.sh/hook-delete-policy": hook-succeeded  # Delete after success
spec:
  ttlSecondsAfterFinished: 30
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: totp-init
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl jq

              echo "Waiting for Keycloak to be ready..."
              until curl -s http://keycloak:8080/auth/realms/master > /dev/null; do
                sleep 5
              done

              echo "Keycloak is ready. Getting admin token..."
              TOKEN=$(curl -s \
                -d "client_id=admin-cli" \
                -d "username=$KEYCLOAK_ADMIN" \
                -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
                -d "grant_type=password" \
                http://keycloak:8080/auth/realms/master/protocol/openid-connect/token | jq -r '.access_token')

              if [ -z "$TOKEN" ]; then
                echo "Failed to get token"
                exit 1
              fi

              echo "Setting CONFIGURE_TOTP as required action for users in realm: $REALM_NAME"

              USERS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users")

              if [ -z "$USERS" ] || [ "$USERS" = "null" ]; then
                echo "No users found in realm or failed to fetch users"
                exit 1
              fi

              USER_COUNT=$(echo "$USERS" | jq length)
              echo "Found $USER_COUNT users in realm"

              for i in $(seq 0 $((USER_COUNT - 1))); do
                USER_JSON=$(echo "$USERS" | jq ".[$i]")
                USER_ID=$(echo "$USER_JSON" | jq -r '.id')
                USERNAME=$(echo "$USER_JSON" | jq -r '.username')

                echo "Processing user: $USERNAME (ID: $USER_ID)"

                # --- NEW: check if user already has OTP configured ---
                CREDENTIALS=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/credentials")

                if echo "$CREDENTIALS" | jq -e '.[] | select(.type=="otp")' > /dev/null; then
                  echo "User $USERNAME already has OTP configured. Skipping..."
                  continue
                fi
                # ------------------------------------------------------

                CURRENT_USER=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID")

                if [ -z "$CURRENT_USER" ] || [ "$CURRENT_USER" = "null" ]; then
                  echo "Failed to fetch user details for $USERNAME, skipping..."
                  continue
                fi

                UPDATED_USER=$(echo "$CURRENT_USER" | jq '
                  .requiredActions = ((.requiredActions // []) + ["CONFIGURE_TOTP"] | unique)
                ')

                echo "Setting CONFIGURE_TOTP as required action for user: $USERNAME"
                PUT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$UPDATED_USER" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID" || echo "000")

                echo "PUT HTTP status for $USERNAME: $PUT_STATUS"

                if [ "$PUT_STATUS" != "204" ] && [ "$PUT_STATUS" != "200" ]; then
                  echo "PUT failed for $USERNAME (non-2xx). Attempting fallback: execute-actions-email..."
                  SEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d '["CONFIGURE_TOTP"]' \
                    "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/execute-actions-email" || echo "000")
                  echo "execute-actions-email HTTP status for $USERNAME: $SEND_STATUS"
                fi
              done

              echo "Successfully processed all $USER_COUNT users in realm $REALM_NAME"
          env:
            - name: REALM_NAME
              value: {{ .Values.keycloakRealmConfiguration.realmName | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD }}