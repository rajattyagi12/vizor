apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-combined-job
  namespace: vizor
  annotations:
    "helm.sh/hook": post-install,post-upgrade  # Run after install/upgrade
    "helm.sh/hook-delete-policy": hook-succeeded  # Delete after success

spec:
  ttlSecondsAfterFinished: 30 # Allow Job to exist for ArgoCD to discover completion
  # backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-combined
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl jq

              echo "Waiting for Keycloak to be ready..."
              until curl -s http://keycloak:8080/auth/realms/master > /dev/null; do
                sleep 5
              done

              echo "Keycloak is ready. Getting admin token..."
              TOKEN=$(curl -s \
                -d "client_id=admin-cli" \
                -d "username=$KEYCLOAK_ADMIN" \
                -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
                -d "grant_type=password" \
                http://keycloak:8080/auth/realms/master/protocol/openid-connect/token | jq -r '.access_token')

              if [ -z "$TOKEN" ]; then
                echo "Failed to get token"
                exit 1
              fi

              echo "=== Starting ClientID Update Phase ==="
              echo "Fetching all users from realm: $REALM_NAME"
              USERS=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users")

              if [ -z "$USERS" ] || [ "$USERS" = "null" ]; then
                echo "No users found in realm"
                exit 0
              fi

              echo "Processing users to update clientID from 0 to 1..."
              UPDATED_COUNT=0

              # Process each user for clientID update
              echo "$USERS" | jq -c '.[]' | while read -r USER; do
                USER_ID=$(echo "$USER" | jq -r '.id')
                USERNAME=$(echo "$USER" | jq -r '.username')
                CLIENT_ID_ATTR=$(echo "$USER" | jq -r '.attributes.clientID? // [] | .[0] // ""')

                # Check if clientID attribute exists and equals "0"
                if [ "$CLIENT_ID_ATTR" = "0" ]; then
                  echo "Updating user: $USERNAME (ID: $USER_ID) - changing clientID from 0 to 1"

                  # Create updated user JSON with clientID changed to 1
                  UPDATED_USER=$(echo "$USER" | jq '
                    .attributes.clientID = ["1"]
                  ')

                  # Update the user
                  RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "$UPDATED_USER" \
                    "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID")

                  if [ "$RESPONSE_CODE" = "204" ] || [ "$RESPONSE_CODE" = "200" ]; then
                    echo "✓ Successfully updated user: $USERNAME"
                    UPDATED_COUNT=$((UPDATED_COUNT + 1))
                  else
                    echo "✗ Failed to update user: $USERNAME (HTTP $RESPONSE_CODE)"
                  fi
                fi
              done

              echo "ClientID update complete. Total users updated: $UPDATED_COUNT"

              echo "=== Starting Role Cleanup Phase ==="
              echo "Checking if Superuser role exists..."
              SUPERUSER_ROLE=$(curl -s \
                -H "Authorization: Bearer $TOKEN" \
                "http://keycloak:8080/auth/admin/realms/$REALM_NAME/roles/Superuser" | jq -c '{id: .id, name: .name}')

              if [ -z "$SUPERUSER_ROLE" ] || [ "$SUPERUSER_ROLE" = "null" ]; then
                echo "Superuser role not found in realm. Creating it..."
                curl -s -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "name": "Superuser",
                    "description": "Superuser role with full permissions"
                  }' \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/roles"
                
                # Get the newly created role
                SUPERUSER_ROLE=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/roles/Superuser" | jq -c '{id: .id, name: .name}')
              fi

              echo "Processing users to find those with multiple roles..."
              PROCESSED_COUNT=0

              # Process each user for role cleanup
              echo "$USERS" | jq -c '.[]' | while read -r USER; do
                USER_ID=$(echo "$USER" | jq -r '.id')
                USERNAME=$(echo "$USER" | jq -r '.username')

                # Get user's realm roles
                USER_ROLES=$(curl -s \
                  -H "Authorization: Bearer $TOKEN" \
                  "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/role-mappings/realm")

                # Count the number of roles (excluding default roles if needed)
                ROLE_COUNT=$(echo "$USER_ROLES" | jq 'length // 0')

                # Check if user has more than one role
                if [ "$ROLE_COUNT" -gt 1 ]; then
                  echo "User $USERNAME has $ROLE_COUNT roles. Removing all roles and adding Superuser role..."

                  # Remove all existing realm roles
                  if [ "$ROLE_COUNT" -gt 0 ]; then
                    echo "Removing $ROLE_COUNT roles from user $USERNAME..."
                    curl -s -X DELETE \
                      -H "Authorization: Bearer $TOKEN" \
                      -H "Content-Type: application/json" \
                      -d "$USER_ROLES" \
                      "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/role-mappings/realm" || echo "Failed to remove roles"
                  fi

                  # Add Superuser role
                  echo "Adding Superuser role to user $USERNAME..."
                  ADD_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "[$SUPERUSER_ROLE]" \
                    "http://keycloak:8080/auth/admin/realms/$REALM_NAME/users/$USER_ID/role-mappings/realm")

                  if [ "$ADD_RESPONSE" = "204" ] || [ "$ADD_RESPONSE" = "200" ]; then
                    echo "✓ Successfully updated user: $USERNAME (removed $ROLE_COUNT roles, added Superuser)"
                    PROCESSED_COUNT=$((PROCESSED_COUNT + 1))
                  else
                    echo "✗ Failed to add Superuser role to user: $USERNAME (HTTP $ADD_RESPONSE)"
                  fi
                fi
              done

              echo "Role cleanup complete. Total users processed: $PROCESSED_COUNT"
              echo "=== Combined Job Complete ==="
          env:
            - name: REALM_NAME
              value: {{ .Values.keycloakRealmConfiguration.realmName | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD }}