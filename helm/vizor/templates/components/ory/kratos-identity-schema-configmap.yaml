apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-identity-schema
  namespace: vizor
data:
  identity.schema.json: |
    {
      "$id": "https://example.com/schemas/identity.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Identity Schema",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email"
            },
            "client_id": {
              "type": ["string", "null"],
              "description": "Null for admin users, UUID for client users"
            },
            "role": {
              "type": "string",
              "enum": [
                "client_user",
                "configuration_manager",
                "admin_super",
                "admin_support",
                "admin_config"
              ]
            }
          },
          "required": ["email", "role"]
        }
      }
    }
