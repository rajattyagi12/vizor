apiVersion: batch/v1
kind: Job
metadata:
  name: create-sftpgo-user
  namespace: vizor
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: create-user
          image: curlimages/curl:latest
          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "Waiting for SFTPGo to be ready..."

              # Retry for 5 minutes
              MAX_RETRIES=60
              RETRY_COUNT=0
              until curl -f http://vizor-sftp-sftpgo.vizor.svc.cluster.local:8080/healthz; do
                echo "Waiting for SFTPGo service..."
                sleep 5
                RETRY_COUNT=$((RETRY_COUNT+1))
                if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
                  echo "Timed out waiting for SFTPGo"
                  exit 1
                fi
              done

              echo "SFTPGo is ready. Requesting token..."

              API_URL="http://vizor-sftp-sftpgo.vizor.svc.cluster.local:8080/api/v2/token" # Corrected URL
              REQUEST_BODY='{ "username": "'"${SFTPGO_DEFAULT_ADMIN_USERNAME}"'", "password": "'"${SFTPGO_DEFAULT_ADMIN_PASSWORD}"'" }'

              # Get HTTP status code
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${API_URL}" \
                -H "Content-Type: application/json" \
                -d "${REQUEST_BODY}")

              # Get full response body
              AUTH_RESPONSE=$(curl -s -X POST "${API_URL}" \
                -H "Content-Type: application/json" \
                -d "${REQUEST_BODY}")

              echo "HTTP Status from token request: $HTTP_STATUS"
              echo "Raw response from token request: $AUTH_RESPONSE"

              # Check if HTTP status is not 200 OK
              if [ "$HTTP_STATUS" -ne 200 ]; then
                  echo "API token request failed with status $HTTP_STATUS."
                  echo "Response body (if any): $AUTH_RESPONSE"
                  exit 1
              fi

              # Proceed if HTTP status is 200
              ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | grep -o '"access_token":"[^"]*' | sed 's/"access_token":"//')

              if [ -z "$ACCESS_TOKEN" ]; then
                echo "Failed to extract token from response even after receiving HTTP 200 OK. Raw response: $AUTH_RESPONSE"
                exit 1
              fi

              echo "Token received. Creating user..."

              PUBLIC_KEY=$(cat /ssh-keys/backend-service.pub)

              USER_RESPONSE=$(curl -s -X POST http://vizor-sftp-sftpgo.vizor.svc.cluster.local:8080/api/v2/users \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "username": "backend-service",
                  "status": 1,
                  "public_keys": ["'"${PUBLIC_KEY}"'"],
                  "home_dir": "/var/lib/sftpgo/users/backend-service",
                  "uid": 1000,
                  "gid": 1000,
                  "permissions": { "/": ["*"] },
                  "filters": {
                    "denied_login_methods": []
                  },
                  "description": "User for backend microservices file operations"
                }')

              echo "Response: $USER_RESPONSE"

              if echo "$USER_RESPONSE" | grep -q "already exists"; then
                echo "User already exists, skipping."
              elif echo "$USER_RESPONSE" | grep -q '"error"'; then
                echo "Error creating user"
                exit 1
              else
                echo "User created successfully"
              fi
          env:
            - name: SFTPGO_DEFAULT_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sftpgo-admin-secret
                  key: SFTPGO_DEFAULT_ADMIN_USERNAME
            - name: SFTPGO_DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sftpgo-admin-secret
                  key: SFTPGO_DEFAULT_ADMIN_PASSWORD
          volumeMounts:
            - name: ssh-keys
              mountPath: /ssh-keys
              readOnly: true
      volumes:
        - name: ssh-keys
          configMap:
            name: ssh-public-keys