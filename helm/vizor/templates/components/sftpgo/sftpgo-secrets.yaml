---
# Secret for admin credentials
apiVersion: v1
kind: Secret
metadata:
  name: sftpgo-admin-secret
  namespace: vizor
type: Opaque
data:
  # Default admin credentials (base64 encoded)
  # Username: admin
  # Password: admin123! (change this!)
  SFTPGO_DEFAULT_ADMIN_USERNAME: YWRtaW4=
  SFTPGO_DEFAULT_ADMIN_PASSWORD: YWRtaW4xMjMh

---
# Secret for backend service SSH private key
apiVersion: v1
kind: Secret
metadata:
  name: backend-ssh-key
  namespace: vizor
type: Opaque
data:
  # Replace this with your actual base64 encoded private key
  # Generate using: base64 -w 0 backend-service-key
  private-key: 

---
# ConfigMap for public keys (used for user creation)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-public-keys
  namespace: vizor
data:
  # Replace with your actual public key content
  backend-service.pub: "ssh-rsa  backend-service@vizor"