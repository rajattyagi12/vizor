apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-migrations
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: migrations
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        vizor: migrations
        {{- include "vizor.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: mcr.microsoft.com/dotnet/sdk:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: vizor-secrets
                  key: connectionString
          command: ["/bin/sh", "-c"]
          args:
            - |
              dotnet tool install --global dotnet-ef && \
              export PATH="$PATH:/root/.dotnet/tools" && \
              echo "Running EF Core migrations..." && \
              dotnet ef database update --project DotNetScaffolding/DotNetScaffolding.csproj
