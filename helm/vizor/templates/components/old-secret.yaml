{{- if .Values.daprComponents.deploy }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.daprComponents.secretStore.secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"

type: Opaque
data:
  {{- range $key, $val := .Values.daprComponents.secrets }}
  {{ $key }}: {{ $val | default "" | toString | b64enc }}
  {{- end }}

  {{- $connectionString := printf "Data Source=%s,%.0f;Initial Catalog=%s;Min Pool Size=4;User Id=%s;Password=%s;Trust Server Certificate=True;Authentication=SqlPassword;" (.Values.sqlServer.service.name | default "") (.Values.sqlServer.service.port | default 0) (.Values.sqlServer.database | default "") (.Values.sqlServer.username | default "") (.Values.sqlServer.dbPassword | default "") }}
  connectionString: {{ $connectionString | toString | b64enc }}

  SA_USERNAME: {{ .Values.sqlServer.username | default "" | toString | b64enc }}
  SA_PASSWORD: {{ .Values.sqlServer.dbPassword | default "" | toString | b64enc }}

  {{- if .Values.daprComponents.sftp.password }}
  sftpPassword: {{ .Values.daprComponents.sftp.password | default "" | toString | b64enc }}
  sftpAddress: {{ .Values.daprComponents.sftp.address | default "" | toString | b64enc }}
  sftpUsername: {{ .Values.daprComponents.sftp.username | default "" | toString | b64enc }}
  sftpRootPath: {{ .Values.daprComponents.sftp.rootPath | default "" | toString | b64enc }}
  {{- end }}

  KeycloakServiceUrl: {{ .Values.keycloakRealmConfiguration.keycloakServiceUrl | default "" | toString | b64enc }}
  vizorEntityId: {{ .Values.keycloakRealmConfiguration.vizorEntityId | default "" | toString | b64enc }}

  LoginUrl: {{ .Values.keycloakRealmConfiguration.serverUrl | default "" | toString | b64enc }}
  KeycloakRedirectUrl: {{ .Values.keycloakRealmConfiguration.serverUrl | default "" | toString | b64enc }}

  KeycloakAdminUsername: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN | default "" | toString | b64enc }}
  KeycloakAdminPassword: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD | default "" | toString | b64enc }}
  KeycloakRealmName: {{ .Values.keycloakRealmConfiguration.realmName | default "" | toString | b64enc }}
  KeycloakAPIBaseUrl: {{ .Values.keycloakRealmConfiguration.keycloakApiBaseUrl | default "" | toString | b64enc }}
  VizorClientPrivateSecret: {{ .Values.keycloakRealmConfiguration.clientPrivateSecret | default "" | toString | b64enc }}

  SsrsUsername: {{ .Values.daprComponents.secrets.SsrsUsername | default "" | toString | b64enc }}
  SsrsPassword: {{ .Values.daprComponents.secrets.SsrsPassword | default "" | toString | b64enc }}
  SsrsBaseUrl: {{ .Values.daprComponents.secrets.SsrsBaseUrl | default "" | toString | b64enc }}
  SsrsTimeoutSeconds: {{ .Values.daprComponents.secrets.SsrsTimeoutSeconds | default "" | toString | b64enc }}

  smtp-mail-default-sender-email: {{ .Values.keycloakRealmConfiguration.adminEmail | default "" | toString | b64enc }}

  saml-jwtkey: {{ .Values.saml.jwtkey | default "" | toString | b64enc }}
  saml-refreshkey: {{ .Values.saml.refreshkey | default "" | toString | b64enc }}
  saml-relaycryptokey: {{ .Values.saml.relaycryptokey | default "" | toString | b64enc }}
  saml-issuer: {{ .Values.saml.issuer | default "" | toString | b64enc }}
  saml-audience: {{ .Values.saml.audience | default "" | toString | b64enc }}

  PowerBI-baseurl: {{ .Values.powerBI.baseurl | default "" | toString | b64enc }}
{{- end }}

---

{{- if .Values.daprComponents.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
{{- end }}

---

{{- if .Values.daprComponents.deploy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vizor-secret-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "vizor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
