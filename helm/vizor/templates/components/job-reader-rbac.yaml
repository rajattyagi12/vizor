{{- if and .Values.components.foundation.enabled .Values.serviceAccount.create }}
# Allows the vizor SA to get/list Jobs (e.g. for wait-for-migrations PreSync hook in apps).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-reader
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vizor-job-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "vizor.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: job-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
