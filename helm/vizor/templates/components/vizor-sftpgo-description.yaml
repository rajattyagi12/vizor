{{- if .Values.sftpgo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vizor.fullname" . }}-sftpgo-description
data:
  description.json: |
    {
      "admins": [
        {{- range $index, $admin := .Values.sftpgo.description.admins }}
        {{- if $index }},{{ end }}
        {
          "id": {{ $admin.id }},
          "username": "{{ $admin.username }}",
          "password": "{{ $admin.password }}",
          "status": {{ $admin.status }},
          "permissions": ["*"]
        }
        {{- end }}
      ],
      "users": [
        {{- range $index, $user := .Values.sftpgo.description.users }}
        {{- if $index }},{{ end }}
        {
          "id": {{ $user.id }},
          "username": "{{ $user.username }}",
          "password": "{{ $user.password }}",
          "status": {{ $user.status }},
          "home_dir": "{{ $user.home_dir }}",
          "permissions": ["read", "write"]
        }
        {{- end }}
      ],
      "folders": [],
      "version": 7
    }
{{- end }}
