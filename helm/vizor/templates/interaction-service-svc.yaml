{{- if .Values.components.apps.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-interaction-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: interaction-service
spec:
  type: ClusterIP
  # ----------------------------------------------------------------------------
  # Session Affinity Configuration for SignalR WebSocket Support
  # ----------------------------------------------------------------------------
  # ClientIP session affinity ensures all requests from the same client IP
  # are routed to the same pod. This is critical for SignalR WebSocket
  # connections because:
  # 1. SignalR negotiation creates a connection ID on a specific pod
  # 2. WebSocket upgrade must hit the same pod to find the connection ID
  # 3. Without session affinity, WebSocket upgrades may hit different pods,
  #    causing "connection not found" errors
  #
  # Timeout: 10800 seconds (3 hours)
  # - Matches typical SignalR connection lifetime
  # - Ensures long-lived WebSocket connections maintain affinity
  # - Prevents connection drops due to session timeout
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours - matches SignalR connection lifetime
  selector:
    vizor: interaction-service
  ports:
    - name: http
      protocol: TCP
      port: 8080
      # Direct routing to application port (bypassing Dapr sidecar)
      # This is necessary because:
      # - Dapr headless services don't support session affinity
      # - SignalR requires sticky sessions for WebSocket connections
      # - Direct routing allows Kubernetes to maintain session affinity
      targetPort: 8080  # Direct to app port (bypassing Dapr for SignalR)
{{- end }}
