{{- if not .Values.ingress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: api-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    app: api-proxy
    purpose: "vizor-api-gateway"
spec:
  type: {{ .Values.apiProxy.serviceType | default "LoadBalancer" }}
  selector:
    app: api-proxy
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      {{- if eq (.Values.apiProxy.serviceType | default "LoadBalancer") "NodePort" }}
      nodePort: {{ .Values.apiProxy.nodePort | default 30080 }}
      {{- end }}
  {{- if .Values.apiProxy.loadBalancerIP }}
  loadBalancerIP: {{ .Values.apiProxy.loadBalancerIP }}
  {{- end }}
{{- end }}

