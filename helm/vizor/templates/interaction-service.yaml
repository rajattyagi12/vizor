apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-interaction-service
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: interaction-service

spec:
  replicas: {{ .Values.interactionService.replicas }}
  selector:
    matchLabels:
      vizor: interaction-service
  template:
    metadata:
      labels:
        vizor: interaction-service
        {{- include "vizor.selectorLabels" . | nindent 8 }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "interaction-service"
        dapr.io/app-port: "8080"
        dapr.io/log-as-json: "true"
        # Enable HTTP proxying so Dapr forwards requests directly to the app
        dapr.io/sidecar-listen-addresses: "0.0.0.0"
      {{- with .Values.interactionService.annotations }}
          {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
    {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}

      containers:
      - name: server
        {{- if .Values.interactionService.image }}
        image: {{ .Values.interactionService.image }}
        imagePullPolicy: {{ .Values.interactionService.imagePullPolicy | default "IfNotPresent" }}
        {{- else }}
        image: {{ .Values.image.registry }}/{{ .Values.image.repo }}/interaction-service:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
        {{- end }}

        env:
        {{- if .Values.auth.clientId }}
          - name: AUTH_CLIENT_ID
            value: {{ .Values.auth.clientId }}
        {{- end }}
        # Note: Redis connection for SignalR is now read from Dapr PubSub component metadata
        # No environment variable needed - application reads directly from Dapr component configuration

        resources:
        {{- with .Values.resources }}
          {{- toYaml . | nindent 10 }}
        {{- end }}

        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 9002
        #     httpHeaders:
        #       - name: "No-Log"
        #         value: "true"
