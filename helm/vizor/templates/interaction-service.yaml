{{- if .Values.components.apps.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-interaction-service
  labels:
    {{- include "vizor.labels" . | nindent 4 }}
    vizor: interaction-service
  annotations:
    argocd.argoproj.io/sync-wave: "10"

spec:
  replicas: {{ .Values.interactionService.replicas }}
  selector:
    matchLabels:
      vizor: interaction-service
  template:
    metadata:
      labels:
        vizor: interaction-service
        {{- include "vizor.selectorLabels" . | nindent 8 }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "interaction-service"
        dapr.io/app-port: "8080"
        dapr.io/log-as-json: "true"
        # Enable HTTP proxying so Dapr forwards requests directly to the app
        dapr.io/sidecar-listen-addresses: "0.0.0.0"
        # Dapr sidecar resource requests/limits required for HPA CPU metrics
        dapr.io/sidecar-cpu-request: "10m"
        dapr.io/sidecar-memory-request: "32Mi"
        dapr.io/sidecar-cpu-limit: "250m"
        dapr.io/sidecar-memory-limit: "256Mi"
      {{- with .Values.interactionService.annotations }}
          {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "vizor.serviceAccountName" . }}
    {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}

      {{- with .Values.scheduling.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
      - name: server
        image: {{ .Values.image.registry }}/{{ .Values.image.repo }}/interaction-service:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}

        env:
        {{- if .Values.auth.clientId }}
          - name: AUTH_CLIENT_ID
            value: {{ .Values.auth.clientId }}
        {{- end }}
        {{- if .Values.interactionService.redisConnectionString }}
          # Redis connection string for SignalR backplane
          # Used to share connection state across multiple pods for WebSocket support
          - name: Redis__ConnectionString
            value: {{ .Values.interactionService.redisConnectionString | quote }}
        {{- end }}

        resources:
        {{- with .Values.resources }}
          {{- toYaml . | nindent 10 }}
        {{- end }}

        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 9002
        #     httpHeaders:
        #       - name: "No-Log"
        #         value: "true"
{{- end }}
