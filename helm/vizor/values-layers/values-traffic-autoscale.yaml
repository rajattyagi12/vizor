components:
  foundation:
    enabled: false
  dataInit:
    enabled: false
  identity:
    enabled: false
  platformSupport:
    enabled: false
  apps:
    enabled: false
  trafficAutoscale:
    enabled: true

# mailhog-ingress is rendered when mailhog.enabled is true (mailhog itself is deployed by vizor-platform-support)
mailhog:
  enabled: false

# Do not create SA here; use the one from foundation (name from Argo param serviceAccount.name or "default").
serviceAccount:
  create: false

local-path-provisioner:
  enabled: false
