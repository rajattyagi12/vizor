# UAT overrides for vizor-secrets chart (Secret content only).
# Override with real values via Argo CD parameters or external secrets; do not commit real credentials.
# SMTP: single source here (Dapr + Keycloak read from Secret). Override smtp-host, smtp-port, etc. as needed.
sqlServer:
  dbPassword: "#CHANGEME"

keycloakRealmConfiguration:
  clientPrivateSecret: "#CHANGEME"
  keycloakEnv:
    KEYCLOAK_ADMIN_PASSWORD: "#CHANGEME"

daprComponents:
  secrets:
    # SMTP: set all below (override via Argo CD params or External Secrets). Keycloak + Dapr read from Secret.
    smtp-host: "#CHANGEME"
    smtp-port: "587"
    smtp-starttls: "true"
    smtp-auth: "true"
    smtp-mail-display-name: "Vizor"
    smtpusername: "#CHANGEME"
    smtppassword: "#CHANGEME"
    SsrsUsername: "#CHANGEME"
    SsrsPassword: "#CHANGEME"
    SsrsBaseUrl: "#CHANGEME"
  sftp:
    address: "#CHANGEME"
    username: "#CHANGEME"
    password: "#CHANGEME"
    rootPath: "."
    insecureIgnoreHostKey: false
