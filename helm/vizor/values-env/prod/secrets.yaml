# Prod overrides for vizor-secrets chart (Secret content only).
# Do NOT commit real credentials. Use Argo CD Helm parameters or External Secrets.
# SMTP: single source here (Dapr + Keycloak read from Secret). Set smtp-host, smtp-port, etc. via params or here.
sqlServer:
  dbPassword: "#CHANGEME"

keycloakRealmConfiguration:
  clientPrivateSecret: "#CHANGEME"
  keycloakEnv:
    KEYCLOAK_ADMIN_PASSWORD: "#CHANGEME"

daprComponents:
  secrets:
    # SMTP: set all below (override via Argo CD params or External Secrets). Keycloak + Dapr read from Secret.
    smtp-host: "#CHANGEME"
    smtp-port: "587"
    smtp-starttls: "true"
    smtp-auth: "true"
    smtp-mail-display-name: "Vizor"
    smtpusername: "#CHANGEME"
    smtppassword: "#CHANGEME"
    SsrsUsername: "#CHANGEME"
    SsrsPassword: "#CHANGEME"
    SsrsBaseUrl: "#CHANGEME"
  sftp:
    # External SFTP: set address (host:port), username, password. When SFTPGo is deployed use vizor-sftpgo:2022 and username vizor.
    address: "#CHANGEME"
    username: "#CHANGEME"
    password: "#CHANGEME"
    rootPath: "."
    insecureIgnoreHostKey: false
