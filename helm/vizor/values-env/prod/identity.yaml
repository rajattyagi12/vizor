# Prod overrides for identity layer.
# Keycloak and realm secrets from vizor-secrets; set hostname and pin image tag.
keycloak:
  startMode: "start"
  # hostname: set via ingress or templatePatch from root values
  eventMetrics:
    enabled: true
    userTags: "realm,clientId"
    userEvents: "login,logout,refresh_token,code_to_token"
