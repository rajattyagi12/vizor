{{- if .Values.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

type: Opaque
data:
  {{- range $key, $val := .Values.daprComponents.secrets }}
  {{ $key }}: {{ $val | b64enc }}
  {{- end }}
  {{- $connectionString := printf "Data Source=%s,%.0f;Initial Catalog=%s;Min Pool Size=4;User Id=%s;Password=%s;Trust Server Certificate=True;Authentication=SqlPassword;" .Values.sqlServer.service.name .Values.sqlServer.service.port .Values.sqlServer.database .Values.sqlServer.username .Values.sqlServer.dbPassword }}
  connectionString: {{ $connectionString | b64enc }}
  SA_USERNAME: {{ .Values.sqlServer.username | b64enc }}
  SA_PASSWORD: {{ .Values.sqlServer.dbPassword | b64enc }}
  {{- $sftpPass := "" }}
  {{- if .Values.daprComponents.sftp }}
  {{- $sftpPass = .Values.daprComponents.sftp.password | default "" }}
  {{- end }}
  sftpPassword: {{ $sftpPass | b64enc }}
  KeycloakServiceUrl: {{ .Values.keycloakRealmConfiguration.keycloakServiceUrl | b64enc }}
  vizorEntityId: {{ .Values.keycloakRealmConfiguration.vizorEntityId | b64enc }}
  LoginUrl: {{ .Values.keycloakRealmConfiguration.serverUrl | b64enc }}
  KeycloakRedirectUrl: {{ .Values.keycloakRealmConfiguration.serverUrl | b64enc }}
  KeycloakAdminUsername: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN | b64enc }}
  KeycloakAdminPassword: {{ .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD | b64enc }}
  RealmName: {{ .Values.keycloakRealmConfiguration.realmName | b64enc }}
  KeycloakAPIBaseUrl: {{ .Values.keycloakRealmConfiguration.keycloakApiBaseUrl | b64enc }}
  VizorClientPrivateSecret: {{ .Values.keycloakRealmConfiguration.clientPrivateSecret | b64enc }}
  KeycloakAdminUserPassword: {{ .Values.keycloakRealmConfiguration.adminUser.password | b64enc }}
  SsrsUsername: {{ .Values.daprComponents.secrets.SsrsUsername | b64enc }}
  SsrsPassword: {{ .Values.daprComponents.secrets.SsrsPassword | b64enc }}
  SsrsBaseUrl: {{ .Values.daprComponents.secrets.SsrsBaseUrl | b64enc }}
  SsrsTimeoutSeconds: {{ .Values.daprComponents.secrets.SsrsTimeoutSeconds | b64enc }}
{{- end }}
