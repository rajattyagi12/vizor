# Fail-fast if required secret values are missing or still #CHANGEME.
# Rendered first (00- prefix); produces no manifest, only validation.
# Set skipSecretValidation: true to disable (e.g. CI or placeholder bootstrap).
{{- if and .Values.createSecret (not .Values.skipSecretValidation) }}
{{- if or (not .Values.sqlServer.dbPassword) (eq .Values.sqlServer.dbPassword "#CHANGEME") }}
{{- fail "vizor-secrets: sqlServer.dbPassword is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not .Values.keycloakRealmConfiguration.clientPrivateSecret) (eq .Values.keycloakRealmConfiguration.clientPrivateSecret "#CHANGEME") }}
{{- fail "vizor-secrets: keycloakRealmConfiguration.clientPrivateSecret is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD) (eq .Values.keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD "#CHANGEME") }}
{{- fail "vizor-secrets: keycloakRealmConfiguration.keycloakEnv.KEYCLOAK_ADMIN_PASSWORD is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not .Values.keycloakRealmConfiguration.adminUser.password) (eq .Values.keycloakRealmConfiguration.adminUser.password "#CHANGEME") }}
{{- fail "vizor-secrets: keycloakRealmConfiguration.adminUser.password is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- $secrets := .Values.daprComponents.secrets }}
{{- if or (not (index $secrets "smtpusername") | default "") (eq (index $secrets "smtpusername") "#CHANGEME") }}
{{- fail "vizor-secrets: daprComponents.secrets.smtpusername is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not (index $secrets "smtppassword") | default "") (eq (index $secrets "smtppassword") "#CHANGEME") }}
{{- fail "vizor-secrets: daprComponents.secrets.smtppassword is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not (index $secrets "SsrsUsername") | default "") (eq (index $secrets "SsrsUsername") "#CHANGEME") }}
{{- fail "vizor-secrets: daprComponents.secrets.SsrsUsername is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not (index $secrets "SsrsPassword") | default "") (eq (index $secrets "SsrsPassword") "#CHANGEME") }}
{{- fail "vizor-secrets: daprComponents.secrets.SsrsPassword is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- if or (not (index $secrets "SsrsBaseUrl") | default "") (eq (index $secrets "SsrsBaseUrl") "#CHANGEME") }}
{{- fail "vizor-secrets: daprComponents.secrets.SsrsBaseUrl is missing or still #CHANGEME. Set via values-env/*/secrets.yaml, Argo CD Helm parameters, or External Secrets." -}}
{{- end }}
{{- end }}
