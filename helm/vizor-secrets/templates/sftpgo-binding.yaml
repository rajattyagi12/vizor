# Dapr SFTP binding. Always created by vizor-secrets when createSecret is true so the binding is present in all environments.
# Dev: set address to vizor-sftpgo:2022 (in-cluster SFTPGo). Prod/UAT: set address to external SFTP host:port.
{{- if .Values.createSecret }}
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.daprComponents.sftp.name | default "sftpgo-binding" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  type: bindings.sftp
  version: v1
  metadata:
    - name: rootPath
      value: "{{ .Values.daprComponents.sftp.rootPath | default "." }}"
    - name: address
      value: "{{ .Values.daprComponents.sftp.address | default "vizor-sftpgo:2022" }}"
    - name: username
      value: "{{ .Values.daprComponents.sftp.username | default "vizor" }}"
    - name: password
      secretKeyRef:
        name: {{ .Values.secretName }}
        key: sftpPassword
    - name: startupDelaySeconds
      value: "30"
    - name: timeout
      value: "60s"
    - name: maxConnections
      value: "10"
    - name: keepAliveInterval
      value: "30s"
    {{- if .Values.daprComponents.sftp.insecureIgnoreHostKey }}
    - name: insecureIgnoreHostKey
      value: "true"
    {{- end }}
{{- end }}
