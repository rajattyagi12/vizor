{{- if .Values.sqlServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.sqlServer.releaseName }}
  labels:
    app: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      serviceAccountName: {{ include "vizor-data-init.serviceAccountName" . }}
      containers:
        - name: mssql-server
          image: "{{ .Values.sqlServer.image }}:{{ .Values.sqlServer.version }}"
          ports:
            - name: mssql
              containerPort: {{ .Values.sqlServer.service.port }}
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretName }}
                  key: SA_PASSWORD
          resources:          
            requests:
               cpu: "1"
               memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.sqlServer.service.name }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: {{ .Values.sqlServer.service.port }}
      targetPort: {{ .Values.sqlServer.service.port }}
  type: NodePort
  selector:
    app: sqlserver
{{- end }}
