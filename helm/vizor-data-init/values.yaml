# Independent values for vizor-data-init chart.

global:
  namespace: vizor
  secretName: vizor-secrets
  serviceAccountName: vizor-runtime
  migrationsJobName: vizor-migrations  # Fixed name so vizor-apps PreSync can wait for it

# ServiceAccount is created by vizor-foundation only; data-init uses it (same namespace).
serviceAccount:
  create: false
  name: ""
  annotations: {}

image:
  registry: 391166432590.dkr.ecr.us-east-1.amazonaws.com
  repo: vizor
  tag: "latest"
  pullSecrets:
    - name: ecr-secret

# SQL Server SA_PASSWORD is read from Secret (global.secretName, key SA_PASSWORD).
# Deploy vizor-secrets before vizor-data-init so the secret exists.
sqlServer:
  enabled: true
  image: mcr.microsoft.com/mssql/server
  version: "2022-latest"
  releaseName: sqlserver
  username: sa
  database: vizor
  dbPassword: "#CHANGEME"  # Not used by SQL Server pod; vizor-secrets uses this to populate the Secret
  service:
    name: sql-server-service
    port: 1433

useMigrationSql: false
