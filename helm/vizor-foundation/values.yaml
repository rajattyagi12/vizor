```yaml
global:
  namespace: vizor-uat   # ✅ match your actual deployment namespace
  secretName: vizor-secrets
  serviceAccountName: vizor-runtime
  # ✅ Use correct Redis from dapr-system (FQDN)
  redisHost: dapr-redis-master.dapr-system.svc.cluster.local:6379

serviceAccount:
  create: true
  name: ""  # uses global.serviceAccountName if empty
  annotations: {}

daprComponents:
  deploy: true

  state:
    name: statestore
    # ✅ fixed Redis host
    redisHost: dapr-redis-master.dapr-system.svc.cluster.local:6379

  pubsub:
    name: pubsub
    # ✅ fixed Redis host
    redisHost: dapr-redis-master.dapr-system.svc.cluster.local:6379

  secretStore:
    name: vizor-secretstore
    componentType: secretstores.kubernetes
    secretName: vizor-secrets

  sftp:
    name: sftpgo-binding
    rootPath: "."
    addressKey: sftpAddress
    usernameKey: sftpUsername
    passwordKey: sftpPassword
    secretName: ""
    insecureIgnoreHostKey: false
    hostPublicKeyKey: ""

persistence:
  enabled: false
  size: 5Gi
  storageClass: local-path
  sftpPvcName: vizor-sftpgo-data
  sftpgoDbPvcName: vizor-sftpgo-db
  backupPvcName: vizor-backup-data

local-path-provisioner:
  enabled: true
  storageClass:
    create: true
    defaultClass: true
    name: local-path
    reclaimPolicy: Retain
    volumeBindingMode: WaitForFirstConsumer
  nodePathMap:
    - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
      paths:
        - /opt/local-path-provisioner
```
