apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vizor-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rajattyagi12/vizor.git
    targetRevision: codex/app-of-apps-inplace-convert
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
